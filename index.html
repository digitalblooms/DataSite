<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UK Charity Explorer - Bloomsbury Foundation</title>
    <style>
        /* Bloomsbury Brand Guidelines Applied */
        :root {
            /* Brand Colors */
            --brand-black: #272726;
            --brand-gold: #F0C69A;
            --brand-gold-dark: #CB9D6B;
            --brand-gold-darker: #A37F58;
            --brand-white: #FFFFFF;
            --brand-grey-1: #3C3C3B;
            --brand-grey-2: #4A4A49;

            /* Semantic colors */
            --primary: var(--brand-gold);
            --primary-dark: var(--brand-gold-dark);
            --success: #10B981;
            --warning: #F59E0B;
            --danger: #EF4444;
            --gray-50: #F9FAFB;
            --gray-100: #F3F4F6;
            --gray-200: #E5E7EB;
            --gray-300: #D1D5DB;
            --gray-600: #4B5563;
            --gray-700: #374151;
            --gray-900: var(--brand-black);
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow: 0 1px 3px 0 rgb(0 0 0 / 0.1), 0 1px 2px -1px rgb(0 0 0 / 0.1);
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
            --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);
            --shadow-xl: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1);
            --shadow-gold: 0 4px 20px rgba(240, 198, 154, 0.3);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Futura', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, var(--brand-black) 0%, var(--brand-grey-1) 100%);
            color: var(--brand-white);
            line-height: 1.6;
            min-height: 100vh;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem 1rem;
        }

        /* Header */
        header {
            text-align: center;
            margin-bottom: 2rem;
            padding-top: 2rem;
        }

        .logo-container {
            margin-bottom: 0;
        }

        .logo {
            max-width: 200px;
            height: auto;
        }

        h1 {
            font-size: 2.25rem;
            font-weight: 600;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, var(--brand-gold) 0%, var(--brand-gold-dark) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0;
            text-transform: none;
            letter-spacing: -0.02em;
        }

        .subtitle {
            font-size: 0.95rem;
            color: var(--brand-white);
            opacity: 0.7;
            font-weight: 400;
        }

        /* Search Section */
        .search-section {
            background: var(--brand-white);
            border-radius: 0.75rem;
            padding: 1.5rem;
            box-shadow: var(--shadow-gold);
            margin-bottom: 3rem;
            border: 2px solid var(--brand-gold);
        }

        .search-form {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .search-input {
            flex: 1;
            min-width: 300px;
            padding: 1rem 1.5rem;
            font-size: 1rem;
            border: 2px solid var(--gray-200);
            border-radius: 0.5rem;
            transition: all 0.2s;
            font-family: 'Futura', sans-serif;
        }

        .search-input:focus {
            outline: none;
            border-color: var(--brand-gold);
            box-shadow: 0 0 0 3px rgba(240, 198, 154, 0.2);
        }

        .search-button {
            padding: 1rem 2rem;
            font-size: 1rem;
            font-weight: 700;
            color: var(--brand-black);
            background: linear-gradient(135deg, var(--brand-gold) 0%, var(--brand-gold-dark) 100%);
            border: none;
            border-radius: 0.5rem;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-family: 'Futura', sans-serif;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .search-button:hover:not(:disabled) {
            background: linear-gradient(135deg, var(--brand-gold-dark) 0%, var(--brand-gold-darker) 100%);
            transform: translateY(-1px);
            box-shadow: var(--shadow-gold);
        }

        .search-button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .spinner {
            border: 2px solid rgba(39, 39, 38, 0.3);
            border-radius: 50%;
            border-top: 2px solid var(--brand-black);
            width: 16px;
            height: 16px;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Results Info */
        .results-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding: 0 0.5rem;
        }

        .results-count {
            font-size: 1.125rem;
            color: var(--brand-gold);
            font-weight: 700;
        }

        /* Results Grid */
        .results-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 1.5rem;
            margin-bottom: 3rem;
        }

        .charity-card {
            background: var(--brand-white);
            border-radius: 0.75rem;
            padding: 1.5rem;
            box-shadow: var(--shadow);
            transition: all 0.3s;
            cursor: pointer;
            border: 2px solid transparent;
        }

        .charity-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-gold);
            border-color: var(--brand-gold);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            gap: 1rem;
            margin-bottom: 1rem;
        }

        .charity-name {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--brand-black);
            line-height: 1.3;
            flex: 1;
        }

        .status-badge {
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 700;
            white-space: nowrap;
        }

        .badge-parent {
            background: var(--brand-gold);
            color: var(--brand-black);
        }

        .badge-subsidiary {
            background: var(--brand-grey-1);
            color: var(--brand-white);
        }

        .charity-activities {
            color: var(--gray-600);
            font-size: 0.9rem;
            margin-bottom: 1rem;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .charity-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
            gap: 0.75rem;
            margin-bottom: 1rem;
            padding-top: 1rem;
            border-top: 2px solid var(--brand-gold);
        }

        .stat {
            text-align: center;
        }

        .stat-label {
            font-size: 0.75rem;
            color: var(--gray-600);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.25rem;
            font-weight: 700;
        }

        .stat-value {
            font-size: 1rem;
            font-weight: 700;
            color: var(--brand-black);
        }

        .charity-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-top: 1rem;
        }

        .tag {
            padding: 0.25rem 0.75rem;
            background: var(--brand-gold);
            color: var(--brand-black);
            border-radius: 0.375rem;
            font-size: 0.8rem;
            font-weight: 600;
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            background: var(--brand-white);
            border-radius: 1rem;
            box-shadow: var(--shadow);
            border: 2px solid var(--brand-gold);
        }

        .empty-state-icon {
            font-size: 4rem;
            margin-bottom: 1rem;
            opacity: 0.5;
        }

        .empty-state-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--brand-black);
            margin-bottom: 0.5rem;
        }

        .empty-state-description {
            font-size: 1rem;
            color: var(--gray-600);
        }

        /* Error Message */
        .error-message {
            background: #FEE2E2;
            border: 2px solid var(--danger);
            color: #991B1B;
            padding: 1rem 1.5rem;
            border-radius: 0.5rem;
            margin-bottom: 2rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .error-icon {
            font-size: 1.5rem;
        }

        /* Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            z-index: 1000;
            overflow-y: auto;
            padding: 2rem 1rem;
        }

        .modal-overlay.active {
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        .modal {
            background: var(--brand-white);
            border-radius: 1rem;
            max-width: 900px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: var(--shadow-gold);
            margin: auto;
            border: 3px solid var(--brand-gold);
        }

        .modal-header {
            padding: 2rem;
            border-bottom: 3px solid var(--brand-gold);
            display: flex;
            justify-content: space-between;
            align-items: start;
            gap: 1rem;
            position: sticky;
            top: 0;
            background: var(--brand-white);
            z-index: 10;
        }

        .modal-title-section {
            flex: 1;
        }

        .modal-title {
            font-size: 1.75rem;
            font-weight: 700;
            color: var(--brand-black);
            margin-bottom: 0.5rem;
        }

        .modal-subtitle {
            font-size: 0.9rem;
            color: var(--gray-600);
            font-weight: 600;
        }

        .close-button {
            background: var(--brand-gold);
            border: none;
            width: 2.5rem;
            height: 2.5rem;
            border-radius: 0.5rem;
            cursor: pointer;
            font-size: 1.25rem;
            color: var(--brand-black);
            transition: all 0.2s;
            flex-shrink: 0;
            font-weight: 700;
        }

        .close-button:hover {
            background: var(--brand-gold-dark);
        }

        .modal-tabs {
            display: flex;
            border-bottom: 2px solid var(--gray-200);
            padding: 0 2rem;
            background: var(--brand-white);
            position: sticky;
            top: 85px;
            z-index: 10;
        }

        .tab {
            padding: 1rem 1.5rem;
            background: none;
            border: none;
            font-size: 1rem;
            font-weight: 700;
            color: var(--gray-600);
            cursor: pointer;
            border-bottom: 3px solid transparent;
            transition: all 0.2s;
            font-family: 'Futura', sans-serif;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .tab:hover {
            color: var(--brand-black);
        }

        .tab.active {
            color: var(--brand-gold);
            border-bottom-color: var(--brand-gold);
        }

        .modal-content {
            padding: 2rem;
        }

        .tab-panel {
            display: none;
        }

        .tab-panel.active {
            display: block;
        }

        .info-grid {
            display: grid;
            gap: 1.5rem;
        }

        .info-item {
            display: grid;
            gap: 0.5rem;
        }

        .info-label {
            font-size: 0.875rem;
            font-weight: 700;
            color: var(--brand-black);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .info-value {
            font-size: 1rem;
            color: var(--gray-700);
        }

        .info-value a {
            color: var(--brand-gold-darker);
            text-decoration: none;
            font-weight: 600;
        }

        .info-value a:hover {
            text-decoration: underline;
        }

        .stat-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .stat-card {
            background: linear-gradient(135deg, var(--brand-black) 0%, var(--brand-grey-1) 100%);
            padding: 1.25rem;
            border-radius: 0.5rem;
            border: 2px solid var(--brand-gold);
        }

        .stat-card-label {
            font-size: 0.875rem;
            color: var(--brand-white);
            margin-bottom: 0.5rem;
            opacity: 0.9;
            font-weight: 600;
        }

        .stat-card-value {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--brand-gold);
        }

        .grants-list {
            display: grid;
            gap: 1rem;
        }

        .grant-item {
            padding: 1rem;
            background: var(--gray-50);
            border-radius: 0.5rem;
            border-left: 4px solid var(--brand-gold);
        }

        .grant-recipient {
            font-weight: 700;
            color: var(--brand-black);
            margin-bottom: 0.25rem;
        }

        .grant-details {
            display: flex;
            gap: 1rem;
            font-size: 0.875rem;
            color: var(--gray-600);
        }

        /* Year-grouped grants styles */
        .grants-year-section {
            margin-bottom: 2rem;
        }

        .grants-year-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.75rem 1rem;
            background: linear-gradient(135deg, var(--brand-black), var(--brand-grey-1));
            color: var(--brand-gold);
            border-radius: 0.5rem;
            margin-bottom: 0.5rem;
            border: 2px solid var(--brand-gold);
        }

        .grants-year-title {
            font-size: 1.1rem;
            font-weight: 700;
        }

        .grants-year-stats {
            font-size: 0.875rem;
            opacity: 0.95;
            color: var(--brand-white);
        }

        .grants-table {
            background: white;
            border: 2px solid var(--brand-gold);
            border-radius: 0.5rem;
            overflow: hidden;
        }

        .grants-table table {
            width: 100%;
            border-collapse: collapse;
        }

        .grants-table thead {
            background: var(--brand-gold);
        }

        .grants-table th {
            padding: 0.75rem 1rem;
            font-size: 0.875rem;
            font-weight: 700;
            color: var(--brand-black);
            text-transform: uppercase;
            letter-spacing: 0.025em;
            border-bottom: 2px solid var(--brand-black);
        }

        .grants-table td {
            padding: 0.625rem 1rem;
            font-size: 0.9rem;
            color: var(--brand-black);
            border-bottom: 1px solid var(--gray-200);
        }

        .grants-table tbody tr:last-child td {
            border-bottom: none;
        }

        .grants-table tbody tr:hover {
            background: rgba(240, 198, 154, 0.1);
        }

        /* Collapsible year sections */
        .grants-year-header {
            cursor: pointer;
            user-select: none;
        }

        .grants-year-header:hover {
            opacity: 0.88;
        }

        .grants-chevron {
            font-size: 0.7rem;
            display: inline-block;
            transition: transform 0.25s ease;
            line-height: 1;
        }

        .grants-chevron.open {
            transform: rotate(180deg);
        }

        .grants-year-body {
            overflow: hidden;
            max-height: 0;
            transition: max-height 0.3s ease;
        }

        /* Analytics panel */
        .analytics-panel {
            background: linear-gradient(135deg, var(--brand-black), var(--brand-grey-1));
            border: 2px solid var(--brand-gold);
            border-radius: 0.75rem;
            padding: 1.25rem;
            margin-bottom: 1.5rem;
        }

        .analytics-panel-title {
            font-size: 0.68rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--brand-gold-dark);
            margin-bottom: 1rem;
        }

        .analytics-row {
            display: grid;
            gap: 1rem;
        }

        .analytics-row.four-col { grid-template-columns: repeat(4, 1fr); }
        .analytics-row.three-col { grid-template-columns: repeat(3, 1fr); }

        @media (max-width: 560px) {
            .analytics-row.four-col,
            .analytics-row.three-col { grid-template-columns: repeat(2, 1fr); }
        }

        .analytics-item { text-align: center; }

        .analytics-item-label {
            font-size: 0.63rem;
            color: var(--brand-white);
            opacity: 0.55;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            margin-bottom: 0.3rem;
            line-height: 1.3;
        }

        .analytics-item-value {
            font-size: 1.05rem;
            font-weight: 700;
            color: var(--brand-gold);
            line-height: 1.2;
        }

        .analytics-item-value.na {
            font-size: 0.8rem;
            opacity: 0.4;
            font-weight: 400;
            font-style: italic;
        }

        .analytics-item-note {
            font-size: 0.62rem;
            color: var(--brand-white);
            opacity: 0.4;
            margin-top: 0.2rem;
        }

        .analytics-divider {
            height: 1px;
            background: rgba(240, 198, 154, 0.2);
            margin: 1rem 0;
        }

        /* Data Coverage */
        .data-coverage-section {
            margin-bottom: 1.5rem;
        }

        .data-coverage-title {
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--gray-600);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.5rem;
        }

        .year-pills {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .year-pill {
            padding: 0.25rem 0.75rem;
            background: var(--brand-gold);
            color: var(--brand-black);
            border-radius: 1rem;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .array-list {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .array-item {
            padding: 0.5rem 1rem;
            background: var(--brand-gold);
            color: var(--brand-black);
            border-radius: 0.5rem;
            font-size: 0.9rem;
            font-weight: 600;
        }

        /* Trustees */
        .trustees-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 1rem;
        }

        .trustee-card {
            display: flex;
            align-items: center;
            gap: 0.875rem;
            padding: 0.875rem 1rem;
            background: var(--gray-50);
            border-radius: 0.5rem;
            border: 2px solid var(--gray-200);
            transition: border-color 0.2s;
        }

        .trustee-card:hover {
            border-color: var(--brand-gold);
        }

        .trustee-card.trustee-chair {
            border-color: var(--brand-gold);
            background: rgba(240, 198, 154, 0.08);
        }

        .trustee-avatar {
            width: 2.5rem;
            height: 2.5rem;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--brand-black), var(--brand-grey-1));
            color: var(--brand-gold);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.875rem;
            flex-shrink: 0;
        }

        .trustee-chair .trustee-avatar {
            background: linear-gradient(135deg, var(--brand-gold), var(--brand-gold-dark));
            color: var(--brand-black);
        }

        .trustee-info {
            flex: 1;
            min-width: 0;
        }

        .trustee-name {
            font-weight: 700;
            color: var(--brand-black);
            font-size: 0.9rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .trustee-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 0.375rem;
            margin-top: 0.25rem;
            align-items: center;
        }

        .trustee-role-badge {
            padding: 0.125rem 0.5rem;
            background: var(--brand-gold);
            color: var(--brand-black);
            border-radius: 9999px;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .trustee-org-badge {
            padding: 0.125rem 0.5rem;
            background: var(--brand-grey-1);
            color: var(--brand-white);
            border-radius: 9999px;
            font-size: 0.7rem;
            font-weight: 700;
        }

        .trustee-date {
            font-size: 0.75rem;
            color: var(--gray-600);
        }

        /* Responsive */
        @media (max-width: 768px) {
            h1 {
                font-size: 2rem;
            }

            .search-form {
                flex-direction: column;
            }

            .search-input {
                min-width: 100%;
            }

            .search-button {
                width: 100%;
                justify-content: center;
            }

            .results-grid {
                grid-template-columns: 1fr;
            }

            .modal {
                margin: 0;
                border-radius: 0;
                max-height: 100vh;
            }

            .modal-tabs {
                top: 85px;
                overflow-x: auto;
            }

            .tab {
                white-space: nowrap;
            }
        }

        /* Loading Skeleton */
        .skeleton {
            background: linear-gradient(90deg, var(--gray-200) 25%, var(--gray-100) 50%, var(--gray-200) 75%);
            background-size: 200% 100%;
            animation: loading 1.5s ease-in-out infinite;
            border-radius: 0.5rem;
        }

        @keyframes loading {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        .skeleton-card {
            background: white;
            border-radius: 0.75rem;
            padding: 1.5rem;
            box-shadow: var(--shadow);
            border: 2px solid var(--brand-gold);
        }

        .skeleton-title {
            height: 1.5rem;
            margin-bottom: 1rem;
        }

        .skeleton-text {
            height: 1rem;
            margin-bottom: 0.5rem;
        }

        /* Search Type Toggle */
        .search-type-toggle {
            display: flex;
            justify-content: flex-end;
            margin-top: 0.75rem;
        }

        .toggle-label {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            cursor: pointer;
            font-size: 0.75rem;
            color: var(--gray-600);
        }

        .toggle-label-text {
            font-weight: 500;
        }

        .toggle-label input[type="checkbox"] {
            display: none;
        }

        .toggle-slider {
            position: relative;
            width: 32px;
            height: 18px;
            background: var(--gray-300);
            border-radius: 18px;
            transition: background 0.3s;
        }

        .toggle-slider::before {
            content: '';
            position: absolute;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: white;
            top: 2px;
            left: 2px;
            transition: transform 0.3s;
        }

        .toggle-label input[type="checkbox"]:checked + .toggle-slider {
            background: var(--brand-gold);
        }

        .toggle-label input[type="checkbox"]:checked + .toggle-slider::before {
            transform: translateX(14px);
        }

        .toggle-label:hover .toggle-slider {
            opacity: 0.8;
        }

        /* Pagination */
        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 1rem;
            margin-top: 1.5rem;
            padding-top: 1.5rem;
            border-top: 2px solid var(--brand-gold);

        .pagination-button {
            padding: 0.5rem 1rem;
            background: var(--brand-gold);
            border: 2px solid var(--brand-gold);
            border-radius: 0.375rem;
            cursor: pointer;
            font-weight: 700;
            color: var(--brand-black);
            transition: all 0.2s;
            font-family: 'Futura', sans-serif;
        }

        .pagination-button:hover:not(:disabled) {
            background: var(--brand-gold-dark);
            transform: translateY(-2px);
            box-shadow: var(--shadow-gold);
        }

        .pagination-button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .pagination-info {
            color: var(--brand-white);
            font-size: 0.9rem;
            font-weight: 600;
        }
    </style>

    <script>
        // Configuration - UPDATE THIS WITH YOUR N8N WEBHOOK URL
        const WEBHOOK_URL = 'https://bloomsburydigital.app.n8n.cloud/webhook/554bf179-93a7-444d-b87c-667a0ff1a4f1';

        let currentResults = [];
        let searchType = 'natural'; // 'natural' or 'name'
        let currentGrantsPage = 1;
        const GRANTS_PER_PAGE = 10;

        // Toggle Search Type
        function toggleSearchType() {
            const checkbox = document.getElementById('searchToggle');
            const searchInput = document.getElementById('searchInput');

            // Update search type based on checkbox state
            searchType = checkbox.checked ? 'name' : 'natural';

            // Update placeholder
            if (searchType === 'name') {
                searchInput.placeholder = 'Enter charity name...';
            } else {
                searchInput.placeholder = 'Describe what you\'re looking for...';
            }
        }

        // Search Form Handler
        document.getElementById('searchForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const query = document.getElementById('searchInput').value.trim();
            if (!query) return;

            await performSearch(query);
        });

        async function performSearch(query) {
            const button = document.getElementById('searchButton');
            const buttonText = document.getElementById('buttonText');
            const errorContainer = document.getElementById('errorContainer');
            const resultsContainer = document.getElementById('resultsContainer');
            const resultsInfo = document.getElementById('resultsInfo');

            // Show loading state
            button.disabled = true;
            buttonText.innerHTML = '<div class="spinner"></div><span>Searching...</span>';
            errorContainer.innerHTML = '';
            resultsInfo.style.display = 'none';

            // Show loading skeletons
            resultsContainer.innerHTML = Array(6).fill(0).map(() => `
                <div class="skeleton-card">
                    <div class="skeleton skeleton-title"></div>
                    <div class="skeleton skeleton-text"></div>
                    <div class="skeleton skeleton-text"></div>
                    <div class="skeleton skeleton-text" style="width: 60%;"></div>
                </div>
            `).join('');

            try {
                const response = await fetch(WEBHOOK_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        query,
                        searchType
                    })
                });

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                let data = await response.json();

                // Handle array wrapper from n8n (if webhook returns [{...}] instead of {...})
                if (Array.isArray(data) && data.length > 0) {
                    data = data[0];
                }

                if (data.success && data.results) {
                    currentResults = data.results;
                    displayResults(data.results);
                } else {
                    throw new Error(data.error || 'Unknown error occurred');
                }
            } catch (error) {
                console.error('Search error:', error);
                errorContainer.innerHTML = `
                    <div class="error-message">
                        <span class="error-icon">⚠️</span>
                        <div>
                            <strong>Search failed:</strong> ${error.message}
                            <br><small>Please check your webhook URL and try again.</small>
                        </div>
                    </div>
                `;
                resultsContainer.innerHTML = '';
            } finally {
                button.disabled = false;
                buttonText.textContent = 'Search';
            }
        }

        function displayResults(results) {
            const resultsContainer = document.getElementById('resultsContainer');
            const resultsInfo = document.getElementById('resultsInfo');
            const resultsCount = document.getElementById('resultsCount');

            if (results.length === 0) {
                resultsInfo.style.display = 'none';
                resultsContainer.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">🔍</div>
                        <h3 class="empty-state-title">No results found</h3>
                        <p class="empty-state-description">Try adjusting your search terms or be more specific.</p>
                    </div>
                `;
                return;
            }

            resultsInfo.style.display = 'block';
            resultsCount.textContent = `${results.length} ${results.length === 1 ? 'charity' : 'charities'} found`;

            resultsContainer.innerHTML = `
                <div class="results-grid">
                    ${results.map((charity, index) => createCharityCard(charity, index)).join('')}
                </div>
            `;
        }

        function createCharityCard(charity, index) {
            // Get income for stats display
            const income = charity.latest_income || 0;

            // Calculate total grants count from recent_grants array
            const recentGrants = parseArray(charity.recent_grants);
            const totalGrantsCount = recentGrants.length;

            // Determine status badge based on linked_charity_number
            let statusBadgeHTML = '';
            const linkedCharityNumber = charity.linked_charity_number;

            // Debug: log the first few charities to see what values we're getting
            if (index < 3) {
                console.log(`Charity ${index}:`, charity.charity_name, 'linked_charity_number:', linkedCharityNumber, 'type:', typeof linkedCharityNumber);
            }

            if (linkedCharityNumber === 0 || linkedCharityNumber === '0') {
                statusBadgeHTML = '<span class="status-badge badge-parent">Parent</span>';
            } else if (linkedCharityNumber && linkedCharityNumber !== null && linkedCharityNumber !== 'null') {
                statusBadgeHTML = `<span class="status-badge badge-subsidiary">Subsidiary #${linkedCharityNumber}</span>`;
            }

            const classifications = parseArray(charity.classifications);
            const areas = parseArray(charity.areas_of_operation);
            const tags = [...classifications.slice(0, 2), ...areas.slice(0, 1)];

            return `
                <div class="charity-card" onclick="showCharityDetail(${index})">
                    <div class="card-header">
                        <h3 class="charity-name">${escapeHtml(charity.charity_name || 'Unknown Charity')}</h3>
                        ${statusBadgeHTML}
                    </div>
                    <p class="charity-activities">
                        ${escapeHtml(charity.charity_activities || 'No description available')}
                    </p>
                    <div class="charity-stats">
                        <div class="stat">
                            <div class="stat-label">Income</div>
                            <div class="stat-value">${formatCurrency(income)}</div>
                        </div>
                        <div class="stat">
                            <div class="stat-label">Grants Given</div>
                            <div class="stat-value">${totalGrantsCount}</div>
                        </div>
                        ${areas.length > 0 ? `
                        <div class="stat">
                            <div class="stat-label">Area</div>
                            <div class="stat-value">${escapeHtml(areas[0])}</div>
                        </div>
                        ` : ''}
                    </div>
                    ${tags.length > 0 ? `
                    <div class="charity-tags">
                        ${tags.map(tag => `<span class="tag">${escapeHtml(tag)}</span>`).join('')}
                    </div>
                    ` : ''}
                </div>
            `;
        }

        function showCharityDetail(index) {
            const charity = currentResults[index];
            const modal = document.getElementById('modalOverlay');

            // Set header
            document.getElementById('modalTitle').textContent = charity.charity_name || 'Unknown Charity';
            document.getElementById('modalSubtitle').textContent = `Charity No. ${charity.registered_charity_number || charity.organisation_number || 'N/A'}`;

            // Populate tabs
            populateOverviewTab(charity);
            populateFinancialsTab(charity);
            populateStrategyTab(charity);
            populateGrantsTab(charity);
            populateTrusteesTab(charity);

            // Show modal
            modal.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            const modal = document.getElementById('modalOverlay');
            modal.classList.remove('active');
            document.body.style.overflow = '';

        function switchTab(tabIndex) {
            // Update tab buttons
            document.querySelectorAll('.tab').forEach((tab, i) => {
                tab.classList.toggle('active', i === tabIndex);

            // Update tab panels
            document.querySelectorAll('.tab-panel').forEach((panel, i) => {

        function populateOverviewTab(charity) {

                    ${charity.charity_contact_postcode ? `

                    <div class="info-item">
                        <div class="info-label">Charity Commission</div>
                        <div class="info-value">
                            <a href="${charityCommissionUrl}" target="_blank" rel="noopener">
                                View on Charity Commission Register

                    ${parseArray(charity.classifications).length > 0 ? `

                    ${parseArray(charity.areas_of_operation).length > 0 ? `

        function populateFinancialsTab(charity) {

            tab.innerHTML = `
                ${hasAI && charity.ai_financial_year ? `

                    ${charity.ai_charitable_expenditure ? `
                    <div class="stat-card">

                ${(charity.ai_unrestricted_funds || charity.ai_restricted_funds || charity.ai_endowment_funds || charity.ai_cash || charity.ai_investments) ? `

        function parseStrategyJson(value) {
            // Returns the parsed object/array, or null if not parseable
            if (!value || value === 'null') return null;
            // Already a proper object/array
            if (typeof value === 'object' && !Array.isArray(value)) return value;
            // If it's an array, check if it looks like broken JSON fragments (starts with '{')
            // and try to rejoin and parse it
            if (Array.isArray(value)) {
                if (value.length === 0) return null;
                const rejoined = value.join(',');
                if (rejoined.trimStart().startsWith('{') || rejoined.trimStart().startsWith('[')) {
                    try { return JSON.parse(rejoined); } catch { /* fall through */ }
                }
                // It's a plain array of strings — return as-is
                return value.filter(Boolean);
            }
            if (typeof value === 'string') {
                const trimmed = value.trim();
                if (!trimmed || trimmed === 'null') return null;
                try { return JSON.parse(trimmed); } catch { return null; }
            }
            return null;
        }

        function renderExclusions(raw) {
            // raw is an object like {excludes_individuals: true, other_exclusions: ["x"]}
            // or an array of strings
            const obj = parseStrategyJson(raw);
            if (!obj) return [];

            if (Array.isArray(obj)) return obj.filter(Boolean);

            const labels = {
                excludes_individuals: 'Excludes individuals',
                excludes_organisations: 'Excludes organisations',
                excludes_political: 'Excludes political activity'
            };

            const results = [];
            for (const [key, val] of Object.entries(obj)) {
                if (key === 'other_exclusions') {
                    if (Array.isArray(val)) val.filter(Boolean).forEach(v => results.push(v));
                } else if (val === true) {
                    results.push(labels[key] || key.replace(/_/g, ' '));
                }
            }
            return results;
        }

        function renderLeverageSignals(raw) {
            // Returns array of {label, items} sections
            const obj = parseStrategyJson(raw);
            if (!obj) return [];

            if (Array.isArray(obj)) {
                return obj.filter(Boolean).length > 0
                    ? [{ label: 'Signals', items: obj.filter(Boolean) }]
                    : [];
            }

            const labelMap = {
                flagship_partners: 'Flagship Partners',
                notable_donors: 'Notable Donors',
                co_trusteeships: 'Co-trusteeships'
            };

            const sections = [];
            for (const [key, val] of Object.entries(obj)) {
                if (Array.isArray(val) && val.filter(Boolean).length > 0) {
                    sections.push({ label: labelMap[key] || key.replace(/_/g, ' '), items: val.filter(Boolean) });
                }
            }
            return sections;
        }

        function populateStrategyTab(charity) {
            const tab = document.getElementById('tab2');
            const missionTags = parseArray(charity.mission_tags);
            const geography = parseArray(charity.geography);
            const exclusions = renderExclusions(charity.exclusion_flags);
            const leverageSections = renderLeverageSignals(charity.leverage_signals);

            const hasContent = charity.mission_text
                || missionTags.length > 0
                || geography.length > 0
                || exclusions.length > 0
                || leverageSections.length > 0;

            if (!hasContent) {
                tab.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📋</div>
                        <h3 class="empty-state-title">No strategy data available</h3>
                        <p class="empty-state-description">Strategy information has not been extracted for this charity.</p>
                    </div>
                `;
                return;
            }

            tab.innerHTML = `
                <div class="info-grid">
                    ${charity.mission_text ? `
                    <div class="info-item">
                        <div class="info-label">Mission</div>
                        <div class="info-value">${escapeHtml(charity.mission_text)}</div>
                    </div>` : ''}
                    ${missionTags.length > 0 ? `
                    <div class="info-item">
                        <div class="info-label">Mission Tags</div>
                        <div class="array-list">
                            ${missionTags.map(t => `<span class="array-item">${escapeHtml(t)}</span>`).join('')}
                        </div>
                    </div>` : ''}
                    ${geography.length > 0 ? `
                    <div class="info-item">
                        <div class="info-label">Geographic Focus</div>
                        <div class="array-list">
                            ${geography.map(g => `<span class="array-item">${escapeHtml(g)}</span>`).join('')}
                        </div>
                    </div>` : ''}
                    ${exclusions.length > 0 ? `
                    <div class="info-item">
                        <div class="info-label">Exclusions</div>
                        <div class="array-list">
                            ${exclusions.map(e => `<span class="array-item" style="background: #FEE2E2; color: #991B1B;">${escapeHtml(e)}</span>`).join('')}
                        </div>
                    </div>` : ''}
                    ${leverageSections.map(section => `
                    <div class="info-item">
                        <div class="info-label">${escapeHtml(section.label)}</div>
                        <div class="array-list">
                            ${section.items.map(item => `<span class="array-item" style="background: #D1FAE5; color: #065F46;">${escapeHtml(item)}</span>`).join('')}
                        </div>
                    </div>`).join('')}
                </div>
            `;
        }

        function populateGrantsTab(charity) {
            const tab = document.getElementById('tab3');
            const grants = parseArray(charity.recent_grants);

            if (grants.length === 0) {
                tab.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">💰</div>
                        <h3 class="empty-state-title">No grant data available</h3>
                        <p class="empty-state-description">This charity has not reported any grants in the recent years.</p>
                    </div>
                `;
                return;
            }

            // Group grants by year
            const grantsByYear = {};
            grants.forEach(grant => {
                const year = grant.grant_year || 'Unknown';
                if (!grantsByYear[year]) grantsByYear[year] = [];
                grantsByYear[year].push(grant);
            });

            // Sort years descending
            const sortedYears = Object.keys(grantsByYear).sort((a, b) => {
                if (a === 'Unknown') return 1;
                if (b === 'Unknown') return -1;
                return parseInt(b) - parseInt(a);
            });

            // Per-year totals
            const yearTotals = {};
            sortedYears.forEach(year => {
                yearTotals[year] = grantsByYear[year].reduce((sum, g) => sum + (g.amount || 0), 0);
            });

            // ── Analytics calculations ──────────────────────────────────────
            const allAmounts = grants.map(g => g.amount || 0).filter(a => a > 0);
            const totalAmount = allAmounts.reduce((s, a) => s + a, 0);

            // Unique recipients
            const uniqueCount = new Set(grants.map(g => (g.recipient_name || '').trim().toLowerCase())).size;

            // Largest grant
            const largestGrant = allAmounts.length > 0 ? Math.max(...allAmounts) : 0;

            // Median grant
            let medianGrant = 0;
            if (allAmounts.length > 0) {
                const sorted = [...allAmounts].sort((a, b) => a - b);
                const mid = Math.floor(sorted.length / 2);
                medianGrant = sorted.length % 2 !== 0 ? sorted[mid] : (sorted[mid - 1] + sorted[mid]) / 2;
            }

            // Mean grant
            const meanGrant = allAmounts.length > 0 ? totalAmount / allAmounts.length : 0;

            // Top 5 recipient concentration
            const recipientTotals = {};
            grants.forEach(g => {
                const name = (g.recipient_name || 'Unknown').trim().toLowerCase();
                recipientTotals[name] = (recipientTotals[name] || 0) + (g.amount || 0);
            });
            const sortedRecipAmts = Object.values(recipientTotals).sort((a, b) => b - a);
            const top5Sum = sortedRecipAmts.slice(0, Math.min(5, sortedRecipAmts.length)).reduce((s, a) => s + a, 0);
            const top5Pct = totalAmount > 0 ? (top5Sum / totalAmount * 100) : 0;

            // Repeat recipient rate & uplift (requires ≥2 distinct years)
            const knownYears = sortedYears.filter(y => y !== 'Unknown');
            let repeatRecipientRate = null;
            let repeatCount = 0;
            let totalUniqueWithYear = 0;
            let upliftRate = null;

            if (knownYears.length >= 2) {
                const recipientYears = {};
                const recipientAmtsByYear = {};
                grants.forEach(g => {
                    if (!g.grant_year || g.grant_year === 'Unknown') return;
                    const name = (g.recipient_name || '').trim().toLowerCase();
                    if (!recipientYears[name]) {
                        recipientYears[name] = new Set();
                        recipientAmtsByYear[name] = {};
                    }
                    recipientYears[name].add(g.grant_year);
                    recipientAmtsByYear[name][g.grant_year] = (recipientAmtsByYear[name][g.grant_year] || 0) + (g.amount || 0);
                });

                totalUniqueWithYear = Object.keys(recipientYears).length;
                repeatCount = Object.values(recipientYears).filter(yrs => yrs.size > 1).length;
                repeatRecipientRate = totalUniqueWithYear > 0 ? (repeatCount / totalUniqueWithYear * 100) : 0;

                if (repeatCount > 0) {
                    const upliftValues = [];
                    Object.entries(recipientYears).forEach(([name, yearsSet]) => {
                        if (yearsSet.size < 2) return;
                        const recipYears = [...yearsSet].filter(y => y !== 'Unknown').map(Number).sort((a, b) => b - a);
                        if (recipYears.length < 2) return;
                        const latestAmt = recipientAmtsByYear[name][recipYears[0].toString()] || 0;
                        const prevAmt   = recipientAmtsByYear[name][recipYears[1].toString()] || 0;
                        if (prevAmt > 0 && latestAmt > 0) {
                            upliftValues.push((latestAmt - prevAmt) / prevAmt * 100);
                        }
                    });
                    if (upliftValues.length > 0) {
                        upliftRate = upliftValues.reduce((s, v) => s + v, 0) / upliftValues.length;
                    }
                }
            }

            // Year coverage pills
            const processedYears = parseArray(charity.processed_grant_years)
                .filter(y => y != null && y !== 'Unknown')
                .map(y => parseInt(y))
                .sort((a, b) => a - b);

            // Formatting helpers
            const fmtPct     = (v, d = 1) => `${v.toFixed(d)}%`;
            const fmtUplift  = v => `${v >= 0 ? '+' : ''}${v.toFixed(1)}%`;
            const upliftColor = upliftRate !== null
                ? (upliftRate >= 0 ? 'var(--success)' : 'var(--danger)')
                : '';

            // Repeat/uplift note helpers
            const repeatNote = repeatRecipientRate !== null
                ? `${repeatCount} of ${totalUniqueWithYear} recipients`
                : 'Single year of data';
            const upliftNote = upliftRate !== null
                ? 'avg YoY for repeat recipients'
                : (repeatRecipientRate === 0 ? 'No repeat recipients' : 'Insufficient data');

            tab.innerHTML = `
                <div class="analytics-panel">
                    <div class="analytics-panel-title">Giving Analytics</div>
                    <div class="analytics-row four-col" style="margin-bottom:1rem;">
                        <div class="analytics-item">
                            <div class="analytics-item-label">Total Grants</div>
                            <div class="analytics-item-value">${grants.length}</div>
                        </div>
                        <div class="analytics-item">
                            <div class="analytics-item-label">Total Amount</div>
                            <div class="analytics-item-value">${formatCurrency(charity.total_grants_given || 0)}</div>
                        </div>
                        <div class="analytics-item">
                            <div class="analytics-item-label">Unique Recipients</div>
                            <div class="analytics-item-value">${uniqueCount}</div>
                        </div>
                        <div class="analytics-item">
                            <div class="analytics-item-label">Latest Year</div>
                            <div class="analytics-item-value">${charity.latest_grant_year || '—'}</div>
                        </div>
                    </div>
                    <div class="analytics-divider"></div>
                    <div class="analytics-row four-col">
                        <div class="analytics-item">
                            <div class="analytics-item-label">Largest Grant</div>
                            <div class="analytics-item-value">${formatCurrency(largestGrant)}</div>
                        </div>
                        <div class="analytics-item">
                            <div class="analytics-item-label">Median Grant</div>
                            <div class="analytics-item-value">${formatCurrency(medianGrant)}</div>
                        </div>
                        <div class="analytics-item">
                            <div class="analytics-item-label">Mean Grant</div>
                            <div class="analytics-item-value">${formatCurrency(meanGrant)}</div>
                        </div>
                        <div class="analytics-item">
                            <div class="analytics-item-label">Top 5 Concentration</div>
                            <div class="analytics-item-value">${fmtPct(top5Pct)}</div>
                            <div class="analytics-item-note">${uniqueCount < 5 ? `of ${uniqueCount} recipients` : 'of total funds'}</div>
                        </div>
                    </div>
                    <div class="analytics-divider"></div>
                    <div class="analytics-row three-col">
                        <div class="analytics-item">
                            <div class="analytics-item-label">Repeat Recipient Rate</div>
                            ${repeatRecipientRate !== null
                                ? `<div class="analytics-item-value">${fmtPct(repeatRecipientRate)}</div>
                                   <div class="analytics-item-note">${repeatNote}</div>`
                                : `<div class="analytics-item-value na">N/A</div>
                                   <div class="analytics-item-note">${repeatNote}</div>`
                            }
                        </div>
                        <div class="analytics-item">
                            <div class="analytics-item-label">Avg Uplift Rate</div>
                            ${upliftRate !== null
                                ? `<div class="analytics-item-value" style="color:${upliftColor}">${fmtUplift(upliftRate)}</div>
                                   <div class="analytics-item-note">${upliftNote}</div>`
                                : `<div class="analytics-item-value na">N/A</div>
                                   <div class="analytics-item-note">${upliftNote}</div>`
                            }
                        </div>
                        <div class="analytics-item">
                            <div class="analytics-item-label">Years of Data</div>
                            <div class="analytics-item-value">${knownYears.length || sortedYears.length}</div>
                            <div class="analytics-item-note">${processedYears.length >= 2 ? processedYears[0] + ' – ' + processedYears[processedYears.length - 1] : (processedYears[0] || '')}</div>
                        </div>
                    </div>
                </div>

                ${processedYears.length > 0 ? `
                <div class="data-coverage-section">
                    <div class="data-coverage-title">Data Coverage</div>
                    <div class="year-pills">
                        ${processedYears.map(year => `<span class="year-pill">${year}</span>`).join('')}
                    </div>
                </div>
                ` : ''}

                ${sortedYears.map((year, i) => `
                    <div class="grants-year-section">
                        <div class="grants-year-header" onclick="toggleGrantYear('grant-year-${year}', this)">
                            <span class="grants-year-title">${year}</span>
                            <div style="display:flex;align-items:center;gap:0.75rem;">
                                <span class="grants-year-stats">${grantsByYear[year].length} grant${grantsByYear[year].length !== 1 ? 's' : ''} · ${formatCurrency(yearTotals[year])}</span>
                                <span class="grants-chevron">▼</span>
                            </div>
                        </div>
                        <div class="grants-year-body" id="grant-year-${year}">
                            <div class="grants-table">
                                <table>
                                    <thead>
                                        <tr>
                                            <th style="text-align:left;width:70%">Recipient</th>
                                            <th style="text-align:right;width:30%">Amount</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        ${grantsByYear[year].map(grant => `
                                            <tr>
                                                <td>${escapeHtml(grant.recipient_name || 'Unknown Recipient')}</td>
                                                <td style="text-align:right;font-weight:600">${formatCurrency(grant.amount || 0)}</td>
                                            </tr>
                                        `).join('')}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                `).join('')}
            `;
        }

        function toggleGrantYear(id, headerEl) {
            const body = document.getElementById(id);
            const chevron = headerEl ? headerEl.querySelector('.grants-chevron') : null;
            if (!body) return;
            const isOpen = body.style.maxHeight !== '0px' && body.style.maxHeight !== '';
            if (isOpen) {
                body.style.maxHeight = body.scrollHeight + 'px';
                requestAnimationFrame(() => requestAnimationFrame(() => { body.style.maxHeight = '0px'; }));
            } else {
                body.style.maxHeight = body.scrollHeight + 'px';
                body.addEventListener('transitionend', () => {
                    if (body.style.maxHeight !== '0px') body.style.maxHeight = 'none';
                }, { once: true });
            }
            if (chevron) chevron.classList.toggle('open', !isOpen);
        }

        function populateTrusteesTab(charity) {
            const tab = document.getElementById('tab4');
            const rawTrustees = parseArray(charity.trustees);

            // Deduplicate by name (case-insensitive), preserving chair status
            const seen = new Map();
            rawTrustees.filter(t => t && t.trustee_name).forEach(t => {
                const key = (t.trustee_name || '').trim().toUpperCase();
                if (!seen.has(key)) {
                    seen.set(key, { ...t });
                } else if (t.trustee_is_chair) {
                    seen.get(key).trustee_is_chair = true;
                }
            });
            const trustees = Array.from(seen.values());

            if (trustees.length === 0) {
                tab.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">👥</div>
                        <h3 class="empty-state-title">No trustee data available</h3>
                        <p class="empty-state-description">Trustee information has not been recorded for this charity.</p>
                    </div>
                `;
                return;
            }

            // Sort: chairs first, then alphabetically
            const sorted = [...trustees].sort((a, b) => {
                if (a.trustee_is_chair && !b.trustee_is_chair) return -1;
                if (!a.trustee_is_chair && b.trustee_is_chair) return 1;
                return (a.trustee_name || '').localeCompare(b.trustee_name || '');
            });

            const chairs = sorted.filter(t => t.trustee_is_chair);
            const others = sorted.filter(t => !t.trustee_is_chair);

            tab.innerHTML = `
                <div class="stat-grid" style="margin-bottom:1.5rem;">
                    <div class="stat-card">
                        <div class="stat-card-label">Total Trustees</div>
                        <div class="stat-card-value">${trustees.length}</div>
                    </div>
                    ${chairs.length > 0 ? `
                    <div class="stat-card">
                        <div class="stat-card-label">Chair${chairs.length > 1 ? 's' : ''}</div>
                        <div class="stat-card-value">${escapeHtml(chairs.map(c => c.trustee_name).join(', '))}</div>
                    </div>` : ''}
                </div>
                <div class="trustees-grid">
                    ${sorted.map(t => `
                    <div class="trustee-card ${t.trustee_is_chair ? 'trustee-chair' : ''}">
                        <div class="trustee-avatar">${getInitials(t.trustee_name)}</div>
                        <div class="trustee-info">
                            <div class="trustee-name">${escapeHtml(t.trustee_name || 'Unknown')}</div>
                            <div class="trustee-meta">
                                ${t.trustee_is_chair ? '<span class="trustee-role-badge">Chair</span>' : ''}
                                ${t.individual_or_organisation === 'organisation' ? '<span class="trustee-org-badge">Organisation</span>' : ''}
                                ${t.trustee_date_of_appointment ? `<span class="trustee-date">Appointed ${formatTrusteeDate(t.trustee_date_of_appointment)}</span>` : ''}
                            </div>
                        </div>
                    </div>`).join('')}
                </div>
            `;
        }

        function getInitials(name) {
            if (!name) return '?';
            const words = name.trim().split(/\s+/);
            if (words.length === 1) return words[0].charAt(0).toUpperCase();
            return (words[0].charAt(0) + words[words.length - 1].charAt(0)).toUpperCase();
        }

        function formatTrusteeDate(dateStr) {
            if (!dateStr) return '';
            try {
                const d = new Date(dateStr);
                return d.toLocaleDateString('en-GB', { month: 'short', year: 'numeric' });
            } catch { return dateStr; }
        }

        // Utility Functions
        function formatCurrency(value) {
            if (!value || value === 0) return '£0';
            if (value >= 1000000) return `£${(value / 1000000).toFixed(1)}M`;
            if (value >= 1000) return `£${(value / 1000).toFixed(0)}K`;
            return `£${value.toLocaleString()}`;
        }

        function parseArray(value) {
            if (!value) return [];
            if (Array.isArray(value)) return value.filter(Boolean);
            if (typeof value === 'string') {
                // Handle comma-separated or JSON array strings
                try {
                    const parsed = JSON.parse(value);
                    return Array.isArray(parsed) ? parsed.filter(Boolean) : [];
                } catch {
                    return value.split(',').map(s => s.trim()).filter(Boolean);
                }
            }
            return [];
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Close modal on overlay click
        document.getElementById('modalOverlay').addEventListener('click', (e) => {
            if (e.target.id === 'modalOverlay') {
                closeModal();
            }
        });

        // Close modal on Escape key
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                closeModal();
            }
        });
    </script>
</body>
</html>
