<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UK Charity Explorer - Bloomsbury Foundation</title>
    <style>
        :root {
            --brand-black: #272726;
            --brand-gold: #F0C69A;
            --brand-gold-dark: #CB9D6B;
            --brand-gold-darker: #A37F58;
            --brand-white: #FFFFFF;
            --brand-grey-1: #3C3C3B;
            --brand-grey-2: #4A4A49;
            --primary: var(--brand-gold);
            --primary-dark: var(--brand-gold-dark);
            --success: #10B981;
            --warning: #F59E0B;
            --danger: #EF4444;
            --gray-50: #F9FAFB;
            --gray-100: #F3F4F6;
            --gray-200: #E5E7EB;
            --gray-300: #D1D5DB;
            --gray-600: #4B5563;
            --gray-700: #374151;
            --gray-900: var(--brand-black);
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow: 0 1px 3px 0 rgb(0 0 0 / 0.1), 0 1px 2px -1px rgb(0 0 0 / 0.1);
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
            --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);
            --shadow-xl: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1);
            --shadow-gold: 0 4px 20px rgba(240, 198, 154, 0.25);
            --drawer-width: min(1120px, calc(100vw - 60px));
            --drawer-sidebar-width: 280px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Futura', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: var(--brand-black);
            color: var(--brand-white);
            line-height: 1.6;
            min-height: 100vh;
        }

        /* ── HERO ──────────────────────────────────────────────────── */
        .hero {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem 1.5rem;
            background: linear-gradient(160deg, #1e1e1d 0%, var(--brand-grey-1) 60%, #242423 100%);
            position: relative;
            transition: min-height 0.45s ease, padding 0.45s ease, background 0.45s ease;
        }

        .hero::after {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(ellipse 80% 60% at 50% 40%, rgba(240,198,154,0.06) 0%, transparent 70%);
            pointer-events: none;
        }

        .hero-inner {
            width: 100%;
            max-width: 640px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2rem;
            position: relative;
            z-index: 1;
            transition: max-width 0.45s ease, flex-direction 0.45s ease, gap 0.45s ease, align-items 0.45s ease;
        }

        .hero-logo {
            transition: all 0.45s ease;
            cursor: default;
        }

        body.has-results .hero-logo {
            cursor: pointer;
        }

        body.has-results .hero-logo:hover .logo {
            opacity: 0.75;
        }

        .logo {
            max-width: 56px;
            height: auto;
            display: block;
            transition: max-width 0.45s ease;
        }

        .hero-text {
            text-align: center;
            transition: opacity 0.3s ease, max-height 0.45s ease;
            overflow: hidden;
        }

        h1 {
            font-size: 2.6rem;
            font-weight: 600;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, var(--brand-gold) 0%, var(--brand-gold-dark) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.03em;
            line-height: 1.1;
            margin-bottom: 0.5rem;
        }

        .subtitle {
            font-size: 0.9rem;
            color: rgba(255,255,255,0.4);
            font-weight: 400;
        }

        /* ── SEARCH WRAPPER ────────────────────────────────────────── */
        .search-wrapper {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 0.625rem;
            transition: all 0.45s ease;
        }

        .search-mode-pills {
            display: flex;
            gap: 0.375rem;
            align-self: flex-start;
        }

        .mode-pill {
            padding: 0.3rem 1rem;
            border-radius: 9999px;
            font-size: 0.72rem;
            font-weight: 700;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            border: 1.5px solid rgba(240,198,154,0.25);
            background: transparent;
            color: rgba(255,255,255,0.4);
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'Futura', sans-serif;
        }

        .mode-pill.active {
            background: var(--brand-gold);
            border-color: var(--brand-gold);
            color: var(--brand-black);
        }

        .mode-pill:hover:not(.active) {
            border-color: rgba(240,198,154,0.5);
            color: rgba(255,255,255,0.7);
        }

        .search-form {
            display: flex;
            gap: 0.625rem;
            width: 100%;
        }

        .search-input {
            flex: 1;
            padding: 0.9rem 1.25rem;
            font-size: 1rem;
            border: 1.5px solid rgba(240,198,154,0.2);
            border-radius: 0.625rem;
            background: rgba(255,255,255,0.05);
            color: var(--brand-white);
            transition: all 0.2s;
            font-family: 'Futura', sans-serif;
        }

        .search-input::placeholder { color: rgba(255,255,255,0.3); }

        .search-input:focus {
            outline: none;
            border-color: var(--brand-gold);
            background: rgba(255,255,255,0.08);
            box-shadow: 0 0 0 3px rgba(240,198,154,0.12);
        }

        .search-button {
            padding: 0.9rem 1.75rem;
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--brand-black);
            background: linear-gradient(135deg, var(--brand-gold) 0%, var(--brand-gold-dark) 100%);
            border: none;
            border-radius: 0.625rem;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-family: 'Futura', sans-serif;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            white-space: nowrap;
        }

        .search-button:hover:not(:disabled) {
            background: linear-gradient(135deg, var(--brand-gold-dark) 0%, var(--brand-gold-darker) 100%);
            transform: translateY(-1px);
            box-shadow: var(--shadow-gold);
        }

        .search-button:disabled {
            opacity: 0.55;
            cursor: not-allowed;
            transform: none;
        }

        .spinner {
            border: 2px solid rgba(39,39,38,0.3);
            border-radius: 50%;
            border-top: 2px solid var(--brand-black);
            width: 14px;
            height: 14px;
            animation: spin 0.8s linear infinite;
            flex-shrink: 0;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* ── COMPACT STATE (body.has-results) ──────────────────────── */
        body.has-results .hero {
            min-height: auto;
            padding: 0.875rem 1.5rem;
            position: sticky;
            top: 0;
            z-index: 50;
            background: rgba(30,30,29,0.96);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-bottom: 1px solid rgba(240,198,154,0.12);
            box-shadow: 0 4px 32px rgba(0,0,0,0.4);
        }

        body.has-results .hero::after { display: none; }

        body.has-results .hero-inner {
            max-width: 1400px;
            flex-direction: row;
            align-items: center;
            gap: 1rem;
        }

        body.has-results .logo { max-width: 28px; }

        body.has-results .hero-text {
            display: none;
        }

        body.has-results .search-wrapper {
            flex-direction: row;
            align-items: center;
            gap: 0.625rem;
            flex: 1;
        }

        body.has-results .search-mode-pills {
            align-self: center;
            flex-shrink: 0;
        }

        body.has-results .search-form { flex: 1; }

        body.has-results .search-input {
            padding: 0.575rem 1rem;
            font-size: 0.875rem;
            border-radius: 0.5rem;
        }

        body.has-results .search-button {
            padding: 0.575rem 1.125rem;
            font-size: 0.75rem;
            border-radius: 0.5rem;
        }

        body.has-results .mode-pill {
            padding: 0.2rem 0.7rem;
            font-size: 0.65rem;
        }

        /* ── RESULTS AREA ───────────────────────────────────────────── */
        .results-area {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem 1.5rem 5rem;
        }

        .results-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .results-count {
            font-size: 0.875rem;
            color: rgba(255,255,255,0.4);
            font-weight: 500;
        }

        .results-count strong {
            color: var(--brand-gold);
            font-weight: 700;
        }

        /* ── RESULTS GRID ───────────────────────────────────────────── */
        .results-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 1.125rem;
        }

        /* ── CHARITY CARD ───────────────────────────────────────────── */
        .charity-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.07);
            border-radius: 0.75rem;
            padding: 1.25rem 1.25rem 1.25rem 1.5rem;
            cursor: pointer;
            transition: background 0.2s, border-color 0.2s, transform 0.2s, box-shadow 0.2s;
            position: relative;
            overflow: hidden;
            animation: cardIn 0.35s ease both;
            animation-delay: var(--card-delay, 0ms);
        }

        .charity-card::before {
            content: '';
            position: absolute;
            left: 0; top: 0; bottom: 0;
            width: 3px;
            background: linear-gradient(180deg, var(--brand-gold) 0%, var(--brand-gold-dark) 100%);
            opacity: 0.4;
            transition: opacity 0.2s;
            border-radius: 3px 0 0 3px;
        }

        .charity-card:hover {
            background: rgba(255,255,255,0.055);
            border-color: rgba(240,198,154,0.25);
            transform: translateY(-2px);
            box-shadow: 0 8px 32px rgba(0,0,0,0.25), 0 0 0 1px rgba(240,198,154,0.08);
        }

        .charity-card:hover::before { opacity: 1; }

        @keyframes cardIn {
            from { opacity: 0; transform: translateY(10px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 0.75rem;
            margin-bottom: 0.625rem;
        }

        .charity-name {
            font-size: 1rem;
            font-weight: 700;
            color: var(--brand-white);
            line-height: 1.35;
            flex: 1;
            letter-spacing: -0.01em;
        }

        .status-badge {
            padding: 0.175rem 0.55rem;
            border-radius: 9999px;
            font-size: 0.65rem;
            font-weight: 700;
            white-space: nowrap;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            flex-shrink: 0;
        }

        .badge-parent {
            background: rgba(240,198,154,0.12);
            color: var(--brand-gold);
            border: 1px solid rgba(240,198,154,0.25);
        }

        .badge-subsidiary {
            background: rgba(255,255,255,0.07);
            color: rgba(255,255,255,0.5);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .charity-activities {
            color: rgba(255,255,255,0.45);
            font-size: 0.83rem;
            margin-bottom: 0.875rem;
            line-height: 1.5;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .charity-stats {
            display: flex;
            gap: 1.5rem;
            padding-top: 0.75rem;
            border-top: 1px solid rgba(240,198,154,0.1);
        }

        .stat { display: flex; flex-direction: column; gap: 0.1rem; }

        .stat-label {
            font-size: 0.65rem;
            color: rgba(255,255,255,0.3);
            text-transform: uppercase;
            letter-spacing: 0.08em;
            font-weight: 600;
        }

        .stat-value {
            font-size: 0.9rem;
            font-weight: 700;
            color: var(--brand-gold);
        }

        .charity-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 0.35rem;
            margin-top: 0.625rem;
        }

        .tag {
            padding: 0.175rem 0.55rem;
            background: rgba(240,198,154,0.08);
            color: rgba(240,198,154,0.7);
            border-radius: 0.25rem;
            font-size: 0.7rem;
            font-weight: 600;
            border: 1px solid rgba(240,198,154,0.12);
        }

        /* ── SKELETON CARDS ─────────────────────────────────────────── */
        .skeleton {
            background: linear-gradient(90deg,
                rgba(255,255,255,0.05) 25%,
                rgba(255,255,255,0.09) 50%,
                rgba(255,255,255,0.05) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s ease-in-out infinite;
            border-radius: 0.375rem;
        }

        @keyframes shimmer {
            0%   { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        .skeleton-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.07);
            border-radius: 0.75rem;
            padding: 1.25rem 1.25rem 1.25rem 1.5rem;
            position: relative;
            overflow: hidden;
        }

        .skeleton-card::before {
            content: '';
            position: absolute;
            left: 0; top: 0; bottom: 0;
            width: 3px;
            background: rgba(240,198,154,0.15);
        }

        .skel-name    { height: 1rem;   width: 72%; margin-bottom: 0.5rem; }
        .skel-badge   { height: 1rem;   width: 20%; margin-bottom: 1rem; }
        .skel-line    { height: 0.75rem; margin-bottom: 0.35rem; }
        .skel-line-s  { height: 0.75rem; width: 60%; margin-bottom: 0.875rem; }
        .skel-stat-row {
            display: flex; gap: 1.5rem;
            padding-top: 0.75rem;
            border-top: 1px solid rgba(255,255,255,0.05);
        }
        .skel-stat    { height: 0.875rem; width: 56px; }

        /* ── LOADING STATE ──────────────────────────────────────────── */
        .loading-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 6rem 2rem;
            gap: 2rem;
        }

        .loading-pulse {
            position: relative;
            width: 56px;
            height: 56px;
        }

        .loading-pulse::before,
        .loading-pulse::after {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 50%;
            border: 2px solid var(--brand-gold);
            animation: pulseRing 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }

        .loading-pulse::after {
            animation-delay: 1s;
        }

        .loading-pulse-inner {
            position: absolute;
            inset: 10px;
            border-radius: 50%;
            background: radial-gradient(circle, var(--brand-gold-dark) 0%, var(--brand-gold-darker) 100%);
            animation: pulseDot 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }

        @keyframes pulseRing {
            0%   { transform: scale(0.6); opacity: 1; }
            100% { transform: scale(1.8); opacity: 0; }
        }

        @keyframes pulseDot {
            0%, 100% { opacity: 1; transform: scale(1); }
            50%       { opacity: 0.6; transform: scale(0.9); }
        }

        .loading-messages {
            text-align: center;
            min-height: 3rem;
        }

        .loading-message {
            font-size: 0.95rem;
            color: rgba(255,255,255,0.6);
            font-weight: 500;
            opacity: 0;
            transform: translateY(6px);
            transition: opacity 0.5s ease, transform 0.5s ease;
            position: absolute;
            left: 50%;
            translate: -50% 0;
            white-space: nowrap;
        }

        .loading-message.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .loading-messages-wrap {
            position: relative;
            height: 1.5rem;
        }

        .loading-submessage {
            font-size: 0.78rem;
            color: rgba(255,255,255,0.25);
            margin-top: 0.5rem;
            text-align: center;
        }

        /* ── EMPTY STATE ────────────────────────────────────────────── */
        .empty-state {
            text-align: center;
            padding: 5rem 2rem;
        }

        .empty-state-icon {
            font-size: 2.5rem;
            margin-bottom: 1rem;
            opacity: 0.35;
        }

        .empty-state-title {
            font-size: 1.2rem;
            font-weight: 700;
            color: rgba(255,255,255,0.55);
            margin-bottom: 0.5rem;
        }

        .empty-state-description {
            font-size: 0.875rem;
            color: rgba(255,255,255,0.3);
        }

        /* ── ERROR ──────────────────────────────────────────────────── */
        .error-message {
            background: rgba(239,68,68,0.08);
            border: 1px solid rgba(239,68,68,0.25);
            color: #FCA5A5;
            padding: 0.875rem 1.125rem;
            border-radius: 0.625rem;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            font-size: 0.875rem;
        }

        .error-icon { font-size: 1.125rem; flex-shrink: 0; }

        /* ── DRAWER ─────────────────────────────────────────────────── */
        .drawer-backdrop {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 200;
        }

        .drawer-backdrop.active { display: block; }

        .drawer-scrim {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.55);
            backdrop-filter: blur(3px);
            -webkit-backdrop-filter: blur(3px);
            animation: scrimIn 0.3s ease forwards;
        }

        @keyframes scrimIn {
            from { opacity: 0; }
            to   { opacity: 1; }
        }

        .drawer {
            position: absolute;
            top: 0; right: 0; bottom: 0;
            width: var(--drawer-width);
            background: #1c1c1b;
            border-left: 1px solid rgba(240,198,154,0.12);
            display: flex;
            flex-direction: column;
            transform: translateX(100%);
            transition: transform 0.38s cubic-bezier(0.32, 0.72, 0, 1);
            box-shadow: -24px 0 80px rgba(0,0,0,0.5);
        }

        .drawer-backdrop.active .drawer {
            transform: translateX(0);
        }

        /* ── DRAWER BODY (sidebar + main) ───────────────────────────── */
        .drawer-body {
            display: grid;
            grid-template-columns: var(--drawer-sidebar-width) 1fr;
            flex: 1;
            overflow: hidden;
        }

        .drawer-sidebar {
            border-right: 1px solid rgba(240,198,154,0.08);
            overflow-y: auto;
            padding: 1.25rem 1.125rem;
            display: flex;
            flex-direction: column;
            gap: 1.375rem;
            scrollbar-width: thin;
            scrollbar-color: rgba(240,198,154,0.12) transparent;
            background: rgba(0,0,0,0.12);
        }

        .drawer-sidebar::-webkit-scrollbar { width: 3px; }
        .drawer-sidebar::-webkit-scrollbar-thumb { background: rgba(240,198,154,0.12); border-radius: 3px; }

        .drawer-main {
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* ── SIDEBAR SECTIONS ───────────────────────────────────────── */
        .sb-section { display: flex; flex-direction: column; gap: 0.25rem; }

        .sb-label {
            font-size: 0.6rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.11em;
            color: rgba(255,255,255,0.22);
            margin-bottom: 0.375rem;
        }

        .sb-stat {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            gap: 0.5rem;
            padding: 0.3rem 0;
            border-bottom: 1px solid rgba(255,255,255,0.04);
        }

        .sb-stat:last-child { border-bottom: none; }

        .sb-stat-label {
            font-size: 0.72rem;
            color: rgba(255,255,255,0.38);
            white-space: nowrap;
        }

        .sb-stat-value {
            font-size: 0.82rem;
            font-weight: 700;
            color: var(--brand-gold);
            text-align: right;
        }

        .sb-link {
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 0.78rem;
            color: rgba(255,255,255,0.55);
            text-decoration: none;
            padding: 0.35rem 0;
            border-bottom: 1px solid rgba(255,255,255,0.04);
            transition: color 0.15s;
        }

        .sb-link:last-child { border-bottom: none; }

        .sb-link:hover { color: var(--brand-gold); }

        .sb-link-arrow {
            font-size: 0.65rem;
            opacity: 0.5;
            flex-shrink: 0;
        }


        .sb-divider {
            height: 1px;
            background: rgba(240,198,154,0.07);
        }

        .sb-pills { display: flex; flex-wrap: wrap; gap: 0.3rem; }

        .sb-pill {
            padding: 0.15rem 0.5rem;
            background: rgba(240,198,154,0.07);
            border: 1px solid rgba(240,198,154,0.1);
            color: rgba(240,198,154,0.65);
            border-radius: 9999px;
            font-size: 0.67rem;
            font-weight: 500;
        }

        .sb-reg {
            font-size: 0.72rem;
            color: rgba(255,255,255,0.3);
            font-family: monospace;
            letter-spacing: 0.03em;
        }

        .drawer-header {
            padding: 1.375rem 1.375rem 1.25rem;
            border-bottom: 1px solid rgba(240,198,154,0.1);
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 1rem;
            flex-shrink: 0;
            background: rgba(240,198,154,0.02);
        }

        .drawer-title-section { flex: 1; min-width: 0; }

        .drawer-title {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--brand-white);
            line-height: 1.3;
            letter-spacing: -0.02em;
            margin-bottom: 0.25rem;
        }

        .drawer-subtitle {
            font-size: 0.775rem;
            color: rgba(255,255,255,0.35);
            font-weight: 500;
        }

        .close-button {
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.09);
            width: 1.875rem;
            height: 1.875rem;
            border-radius: 0.4rem;
            cursor: pointer;
            font-size: 0.875rem;
            color: rgba(255,255,255,0.5);
            transition: all 0.2s;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .close-button:hover {
            background: rgba(240,198,154,0.12);
            border-color: rgba(240,198,154,0.25);
            color: var(--brand-gold);
        }

        /* ── DRAWER TABS ────────────────────────────────────────────── */
        .modal-tabs {
            display: flex;
            padding: 0 0.875rem;
            border-bottom: 1px solid rgba(255,255,255,0.06);
            flex-shrink: 0;
            overflow-x: auto;
            background: rgba(0,0,0,0.18);
            scrollbar-width: none;
        }

        .modal-tabs::-webkit-scrollbar { display: none; }

        .tab {
            padding: 0.7rem 0.875rem;
            background: none;
            border: none;
            font-size: 0.7rem;
            font-weight: 700;
            color: rgba(255,255,255,0.3);
            cursor: pointer;
            border-bottom: 2px solid transparent;
            transition: all 0.2s;
            font-family: 'Futura', sans-serif;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            white-space: nowrap;
            margin-bottom: -1px;
        }

        .tab:hover { color: rgba(255,255,255,0.65); }

        .tab.active {
            color: var(--brand-gold);
            border-bottom-color: var(--brand-gold);
        }

        /* ── DRAWER CONTENT ─────────────────────────────────────────── */
        .modal-content {
            flex: 1;
            overflow-y: auto;
            padding: 1.375rem;
            scrollbar-width: thin;
            scrollbar-color: rgba(240,198,154,0.15) transparent;
        }

        .modal-content::-webkit-scrollbar { width: 3px; }
        .modal-content::-webkit-scrollbar-track { background: transparent; }
        .modal-content::-webkit-scrollbar-thumb {
            background: rgba(240,198,154,0.15);
            border-radius: 3px;
        }

        .tab-panel { display: none; }
        .tab-panel.active { display: block; }

        /* ── INFO GRID ──────────────────────────────────────────────── */
        .info-grid { display: grid; gap: 1.25rem; }

        .info-item { display: grid; gap: 0.3rem; }

        .info-label {
            font-size: 0.67rem;
            font-weight: 700;
            color: rgba(255,255,255,0.3);
            text-transform: uppercase;
            letter-spacing: 0.09em;
        }

        .info-value {
            font-size: 0.875rem;
            color: rgba(255,255,255,0.75);
            line-height: 1.55;
        }

        .info-value a {
            color: var(--brand-gold);
            text-decoration: none;
            font-weight: 500;
        }

        .info-value a:hover { text-decoration: underline; }

        /* ── STAT CARDS (in drawer) ─────────────────────────────────── */
        .stat-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
            gap: 0.625rem;
            margin-bottom: 1.375rem;
        }

        .stat-card {
            background: rgba(255,255,255,0.035);
            border: 1px solid rgba(240,198,154,0.12);
            padding: 0.875rem 1rem;
            border-radius: 0.625rem;
        }

        .stat-card-label {
            font-size: 0.67rem;
            color: rgba(255,255,255,0.35);
            margin-bottom: 0.35rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.07em;
        }

        .stat-card-value {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--brand-gold);
        }

        /* ── AI BANNER ──────────────────────────────────────────────── */
        .ai-banner {
            margin-bottom: 1rem;
            padding: 0.55rem 0.875rem;
            background: rgba(240,198,154,0.07);
            border-left: 2.5px solid var(--brand-gold);
            border-radius: 0 0.375rem 0.375rem 0;
            font-size: 0.775rem;
            color: rgba(255,255,255,0.5);
        }

        /* ── SECTION HEADING ────────────────────────────────────────── */
        .section-heading {
            font-size: 0.67rem;
            font-weight: 700;
            color: rgba(255,255,255,0.3);
            text-transform: uppercase;
            letter-spacing: 0.09em;
            margin-bottom: 0.625rem;
        }

        /* ── FINANCIALS TAB ─────────────────────────────────────────── */
        .fin-headline {
            display: flex;
            align-items: center;
            padding: 1.125rem 1.25rem;
            border-radius: 0.625rem;
            margin-bottom: 1.25rem;
            border: 1px solid;
        }

        .fin-headline.surplus  { background: rgba(16,185,129,0.07);  border-color: rgba(16,185,129,0.2); }
        .fin-headline.deficit  { background: rgba(239,68,68,0.07);   border-color: rgba(239,68,68,0.2);  }
        .fin-headline.neutral  { background: rgba(255,255,255,0.04); border-color: rgba(255,255,255,0.1); }

        .fin-headline-label {
            font-size: 0.63rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 0.3rem;
        }

        .fin-headline.surplus .fin-headline-label { color: #6EE7B7; }
        .fin-headline.deficit .fin-headline-label { color: #FCA5A5; }
        .fin-headline.neutral .fin-headline-label { color: rgba(255,255,255,0.35); }

        .fin-headline-amount {
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: -0.03em;
            line-height: 1;
        }

        .fin-headline.surplus .fin-headline-amount { color: #34D399; }
        .fin-headline.deficit .fin-headline-amount { color: #F87171; }
        .fin-headline.neutral .fin-headline-amount { color: rgba(255,255,255,0.4); }

        .fin-headline-margin {
            font-size: 0.75rem;
            margin-top: 0.3rem;
            opacity: 0.65;
        }

        .fin-headline.surplus .fin-headline-margin { color: #6EE7B7; }
        .fin-headline.deficit .fin-headline-margin { color: #FCA5A5; }

        /* Visual comparison bars */
        .fin-compare { margin-bottom: 1.375rem; }

        .fin-compare-row {
            display: grid;
            grid-template-columns: 78px 1fr 72px;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 0.5rem;
        }

        .fin-compare-label {
            font-size: 0.63rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: rgba(255,255,255,0.3);
            text-align: right;
        }

        .fin-compare-track {
            height: 7px;
            background: rgba(255,255,255,0.06);
            border-radius: 4px;
            overflow: hidden;
        }

        .fin-compare-fill {
            height: 100%;
            border-radius: 4px;
            animation: finBarGrow 0.65s cubic-bezier(0.4, 0, 0.2, 1) both;
            animation-delay: var(--bar-delay, 0ms);
        }

        .fin-compare-fill.income      { background: linear-gradient(90deg, var(--brand-gold), var(--brand-gold-dark)); }
        .fin-compare-fill.expenditure { background: rgba(255,255,255,0.22); }
        .fin-compare-fill.expenditure.over { background: rgba(239,68,68,0.55); }

        @keyframes finBarGrow {
            from { width: 0; }
            to   { width: var(--bar-pct, 100%); }
        }

        .fin-compare-value { font-size: 0.82rem; font-weight: 700; color: var(--brand-gold); }
        .fin-compare-value.dim { color: rgba(255,255,255,0.45); }

        /* Two-column breakdown */
        .fin-columns {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.25rem;
            margin-bottom: 1.375rem;
        }

        .fin-col-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid rgba(240,198,154,0.1);
            margin-bottom: 0.75rem;
        }

        .fin-col-title {
            font-size: 0.63rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.09em;
            color: rgba(255,255,255,0.28);
        }

        .fin-col-total {
            font-size: 0.95rem;
            font-weight: 700;
            color: var(--brand-gold);
        }

        .fin-line { margin-bottom: 0.625rem; }

        .fin-line-top {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 0.25rem;
        }

        .fin-line-label { font-size: 0.72rem; color: rgba(255,255,255,0.42); }
        .fin-line-value { font-size: 0.75rem; font-weight: 700; color: rgba(255,255,255,0.65); }

        .fin-line-track {
            height: 3px;
            background: rgba(255,255,255,0.06);
            border-radius: 2px;
            overflow: hidden;
        }

        .fin-line-fill {
            height: 100%;
            border-radius: 2px;
            background: rgba(240,198,154,0.35);
            animation: finBarGrow 0.65s cubic-bezier(0.4, 0, 0.2, 1) both;
            animation-delay: var(--bar-delay, 0.1s);
        }

        .fin-nil { font-size: 0.72rem; color: rgba(255,255,255,0.2); font-style: italic; }

        /* ── GRANTS ─────────────────────────────────────────────────── */
        .grants-year-section { margin-bottom: 1rem; }

        .grants-year-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.575rem 0.875rem;
            background: rgba(240,198,154,0.06);
            border: 1px solid rgba(240,198,154,0.12);
            color: var(--brand-gold);
            border-radius: 0.5rem;
            margin-bottom: 0.375rem;
            cursor: pointer;
            user-select: none;
            transition: background 0.2s;
        }

        .grants-year-header:hover { background: rgba(240,198,154,0.1); }

        .grants-year-title { font-size: 0.875rem; font-weight: 700; }

        .grants-year-stats { font-size: 0.72rem; color: rgba(255,255,255,0.4); }

        .grants-chevron {
            font-size: 0.55rem;
            display: inline-block;
            transition: transform 0.25s ease;
            color: rgba(255,255,255,0.4);
        }

        .grants-chevron.open { transform: rotate(180deg); }

        .grants-year-body {
            overflow: hidden;
            max-height: 0;
            transition: max-height 0.3s ease;
        }

        .grants-table {
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 0.5rem;
            overflow: hidden;
        }

        .grants-table table { width: 100%; border-collapse: collapse; }

        .grants-table thead {
            background: rgba(240,198,154,0.06);
            border-bottom: 1px solid rgba(240,198,154,0.1);
        }

        .grants-table th {
            padding: 0.55rem 0.875rem;
            font-size: 0.67rem;
            font-weight: 700;
            color: rgba(255,255,255,0.35);
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        .grants-table td {
            padding: 0.475rem 0.875rem;
            font-size: 0.825rem;
            color: rgba(255,255,255,0.7);
            border-bottom: 1px solid rgba(255,255,255,0.04);
        }

        .grants-table tbody tr:last-child td { border-bottom: none; }
        .grants-table tbody tr:hover { background: rgba(240,198,154,0.03); }
        .grants-table th:hover { opacity: 0.7; }
        .sort-indicator { font-size: 0.55rem; opacity: 0.5; }
        .sort-indicator.asc::after  { content: ' ▲'; }
        .sort-indicator.desc::after { content: ' ▼'; }

        /* ── ANALYTICS PANEL ────────────────────────────────────────── */
        .analytics-panel {
            background: rgba(240,198,154,0.04);
            border: 1px solid rgba(240,198,154,0.12);
            border-radius: 0.625rem;
            padding: 1.125rem;
            margin-bottom: 1.25rem;
        }

        .analytics-panel-title {
            font-size: 0.63rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            color: rgba(240,198,154,0.5);
            margin-bottom: 1rem;
        }

        .analytics-row { display: grid; gap: 0.625rem; }
        .analytics-row.four-col  { grid-template-columns: repeat(4, 1fr); }
        .analytics-row.three-col { grid-template-columns: repeat(3, 1fr); }

        @media (max-width: 560px) {
            .analytics-row.four-col,
            .analytics-row.three-col { grid-template-columns: repeat(2, 1fr); }
        }

        .analytics-item { text-align: center; }

        .analytics-item-label {
            font-size: 0.58rem;
            color: rgba(255,255,255,0.3);
            text-transform: uppercase;
            letter-spacing: 0.07em;
            margin-bottom: 0.25rem;
            line-height: 1.3;
        }

        .analytics-item-value {
            font-size: 1rem;
            font-weight: 700;
            color: var(--brand-gold);
        }

        .analytics-item-value.na {
            font-size: 0.775rem;
            opacity: 0.35;
            font-weight: 400;
            font-style: italic;
        }

        .analytics-item-note {
            font-size: 0.56rem;
            color: rgba(255,255,255,0.25);
            margin-top: 0.2rem;
        }

        .analytics-divider {
            height: 1px;
            background: rgba(240,198,154,0.08);
            margin: 0.875rem 0;
        }

        /* ── DATA COVERAGE ──────────────────────────────────────────── */
        .data-coverage-section { margin-bottom: 1.25rem; }

        .data-coverage-title {
            font-size: 0.65rem;
            font-weight: 600;
            color: rgba(255,255,255,0.3);
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 0.5rem;
        }

        .year-pills { display: flex; flex-wrap: wrap; gap: 0.35rem; }

        .year-pill {
            padding: 0.175rem 0.6rem;
            background: rgba(240,198,154,0.08);
            color: var(--brand-gold);
            border: 1px solid rgba(240,198,154,0.18);
            border-radius: 9999px;
            font-size: 0.7rem;
            font-weight: 600;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.15s;
        }

        .year-pill:hover { background: rgba(240,198,154,0.16); }

        /* ── ARRAY LISTS ────────────────────────────────────────────── */
        .array-list { display: flex; flex-wrap: wrap; gap: 0.35rem; }

        .array-item {
            padding: 0.25rem 0.65rem;
            background: rgba(240,198,154,0.08);
            color: rgba(240,198,154,0.8);
            border: 1px solid rgba(240,198,154,0.12);
            border-radius: 0.375rem;
            font-size: 0.775rem;
            font-weight: 500;
        }

        /* ── TRUSTEES ───────────────────────────────────────────────── */
        .trustees-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
            gap: 0.625rem;
        }

        .trustee-card {
            display: flex;
            align-items: center;
            gap: 0.7rem;
            padding: 0.7rem 0.875rem;
            background: rgba(255,255,255,0.03);
            border-radius: 0.5rem;
            border: 1px solid rgba(255,255,255,0.06);
            transition: border-color 0.2s;
        }

        .trustee-card:hover { border-color: rgba(240,198,154,0.2); }

        .trustee-card.trustee-chair {
            border-color: rgba(240,198,154,0.2);
            background: rgba(240,198,154,0.04);
        }

        .trustee-avatar {
            width: 2.125rem;
            height: 2.125rem;
            border-radius: 50%;
            background: rgba(255,255,255,0.06);
            color: var(--brand-gold);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.75rem;
            flex-shrink: 0;
            border: 1px solid rgba(240,198,154,0.12);
        }

        .trustee-chair .trustee-avatar {
            background: linear-gradient(135deg, var(--brand-gold), var(--brand-gold-dark));
            color: var(--brand-black);
            border-color: transparent;
        }

        .trustee-info { flex: 1; min-width: 0; }

        .trustee-name {
            font-weight: 700;
            color: rgba(255,255,255,0.8);
            font-size: 0.825rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .trustee-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 0.3rem;
            margin-top: 0.2rem;
            align-items: center;
        }

        .trustee-role-badge {
            padding: 0.1rem 0.4rem;
            background: var(--brand-gold);
            color: var(--brand-black);
            border-radius: 9999px;
            font-size: 0.6rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .trustee-org-badge {
            padding: 0.1rem 0.4rem;
            background: rgba(255,255,255,0.09);
            color: rgba(255,255,255,0.55);
            border-radius: 9999px;
            font-size: 0.6rem;
            font-weight: 700;
        }

        .trustee-date {
            font-size: 0.65rem;
            color: rgba(255,255,255,0.3);
        }

        /* ── RESPONSIVE ─────────────────────────────────────────────── */
        @media (max-width: 768px) {
            h1 { font-size: 2rem; }

            :root { --drawer-width: 100vw; --drawer-sidebar-width: 0px; }

            .drawer-body { grid-template-columns: 1fr; }
            .drawer-sidebar { display: none; }

            .drawer {
                top: auto;
                bottom: 0;
                left: 0;
                right: 0;
                width: 100%;
                height: 93vh;
                border-left: none;
                border-top: 1px solid rgba(240,198,154,0.12);
                border-radius: 1rem 1rem 0 0;
                transform: translateY(100%);
                transition: transform 0.38s cubic-bezier(0.32, 0.72, 0, 1);
                box-shadow: 0 -16px 64px rgba(0,0,0,0.5);
            }

            .drawer-backdrop.active .drawer { transform: translateY(0); }

            body.has-results .hero { padding: 0.75rem 1rem; }

            body.has-results .hero-inner { gap: 0.75rem; }

            body.has-results .search-wrapper {
                flex-wrap: wrap;
                gap: 0.5rem;
            }

            body.has-results .search-mode-pills { order: -1; }

            .results-grid { grid-template-columns: 1fr; }

            .results-area { padding: 1.5rem 1rem 4rem; }
        }
    </style>
</head>
<body>

    <!-- ── HERO / COMPACT SEARCH BAR ──────────────────────────────── -->
    <div class="hero" id="heroSection">
        <div class="hero-inner">
            <div class="hero-logo" onclick="resetToHome()" title="Return to home">
                <svg xmlns="http://www.w3.org/2000/svg" width="41.913" height="67.353" viewBox="0 0 41.913 67.353" class="logo"><defs><style>.a{fill:#F0C69A;}</style></defs><g transform="translate(-10.203 -5.781)"><path class="a" d="M52.93,5.781" transform="translate(-21.643)"></path><path class="a" d="M29.082,51.042c.683-.184,1.374-.343,2.065-.47l-11.285.036.018,4.914A26.742,26.742,0,0,1,29.082,51.042Z" transform="translate(-4.893 -22.689)"></path><path class="a" d="M73.728,50.425l-11.389.04A27.087,27.087,0,0,1,73.747,55.44Z" transform="translate(-26.409 -22.614)"></path><path class="a" d="M14.071,117.533a21,21,0,0,0,19.056,12.209,21.193,21.193,0,0,0,3.782-.344l-1.812-6.79Z" transform="translate(-1.959 -56.608)"></path><path class="a" d="M74.805,77.3,81.65,96.981a21,21,0,0,0-1.8-24.715Z" transform="translate(-32.724 -33.678)"></path><path class="a" d="M56.444,94.195l5.143,19.273a20.885,20.885,0,0,0,7.827-4.948c.176-.176.343-.357.512-.538L62.892,87.76Z" transform="translate(-23.423 -41.526)"></path><path class="a" d="M32.9,74.784l9.267,2.493L56.28,63.2a20.814,20.814,0,0,0-7.756-4.188Z" transform="translate(-11.499 -26.962)"></path><path class="a" d="M34.319,57.413c-.637-.058-1.276-.089-1.915-.089A20.981,20.981,0,0,0,12.646,71.241l6.3,1.7Z" transform="translate(-1.237 -26.109)"></path><path class="a" d="M29.808,97.219l-19.254-5.18a21.095,21.095,0,0,0,.253,8.846l21.355,5.154Z" transform="translate(0 -43.694)"></path><path class="a" d="M31.983,25.625l-2.367,2.609-2.36-2.6,2.367-2.609Z" transform="translate(-8.638 -8.734)"></path><path class="a" d="M72.943,25.625l-2.367,2.609-2.36-2.6,2.367-2.609Z" transform="translate(-29.386 -8.734)"></path><path class="a" d="M51.055,13.81l-1.146,1.262,1.146,1.262.212.233-5.14,5.8-1.971-2.257-7.271-8.346,1.868-2.372L36.106,5.919,33.311,9.395l1.868,2.372-7.272,8.346L25.936,22.37c-2.011-2.271-4.011-4.529-5.14-5.8l.211-.233,1.146-1.262L21.007,13.81l-1.145-1.262V25.4H52.2V12.548Z" transform="translate(-4.893 -0.07)"></path></g></svg>
            </div>
            <div class="hero-text">
                <h1>UK Charity Explorer</h1>
                <p class="subtitle">Powered by Bloomsbury Foundation</p>
            </div>
            <div class="search-wrapper">
                <div class="search-mode-pills">
                    <button class="mode-pill active" id="pillSemantic" onclick="setSearchMode('natural')">AI Search</button>
                    <button class="mode-pill" id="pillName" onclick="setSearchMode('name')">Name</button>
                </div>
                <form id="searchForm" class="search-form">
                    <input
                        type="text"
                        id="searchInput"
                        class="search-input"
                        placeholder="Describe what you're looking for..."
                        required
                    />
                    <button type="submit" id="searchButton" class="search-button">
                        <span id="buttonText">Search</span>
                    </button>
                </form>
            </div>
        </div>
    </div>

    <!-- ── RESULTS AREA ────────────────────────────────────────────── -->
    <div class="results-area">
        <div id="errorContainer"></div>
        <div id="resultsInfo" style="display: none;">
            <div class="results-info">
                <div class="results-count" id="resultsCount"></div>
            </div>
        </div>
        <div id="resultsContainer"></div>
    </div>

    <!-- ── DRAWER (replaces modal) ────────────────────────────────── -->
    <div id="drawerBackdrop" class="drawer-backdrop">
        <div class="drawer-scrim" id="drawerScrim"></div>
        <div class="drawer" id="drawerPanel">
            <div class="drawer-header">
                <div class="drawer-title-section">
                    <h2 class="drawer-title" id="modalTitle"></h2>
                    <p class="drawer-subtitle" id="modalSubtitle"></p>
                </div>
                <button class="close-button" onclick="closeModal()">✕</button>
            </div>
            <div class="drawer-body">
                <div class="drawer-sidebar" id="drawerSidebar"></div>
                <div class="drawer-main">
                    <div class="modal-tabs">
                        <button class="tab active" onclick="switchTab(0)">Overview</button>
                        <button class="tab" onclick="switchTab(1)">Financials</button>
                        <button class="tab" onclick="switchTab(2)">Strategy</button>
                        <button class="tab" onclick="switchTab(3)">Grants</button>
                        <button class="tab" onclick="switchTab(4)">Trustees</button>
                    </div>
                    <div class="modal-content">
                        <div id="tab0" class="tab-panel active"></div>
                        <div id="tab1" class="tab-panel"></div>
                        <div id="tab2" class="tab-panel"></div>
                        <div id="tab3" class="tab-panel"></div>
                        <div id="tab4" class="tab-panel"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Configuration
        const WEBHOOK_URL = 'https://bloomsburydigital.app.n8n.cloud/webhook/554bf179-93a7-444d-b87c-667a0ff1a4f1';

        let currentResults = [];
        let searchType = 'natural'; // 'natural' or 'name'
        let currentGrantsPage = 1;
        const GRANTS_PER_PAGE = 10;

        // Search mode pills
        function setSearchMode(mode) {
            searchType = mode;
            document.getElementById('pillSemantic').classList.toggle('active', mode === 'natural');
            document.getElementById('pillName').classList.toggle('active', mode === 'name');
            document.getElementById('searchInput').placeholder =
                mode === 'name' ? 'Enter charity name...' : 'Describe what you\'re looking for...';
        }

        // Search Form Handler
        document.getElementById('searchForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const query = document.getElementById('searchInput').value.trim();
            if (!query) return;
            await performSearch(query);
        });

        async function performSearch(query) {
            const button = document.getElementById('searchButton');
            const buttonText = document.getElementById('buttonText');
            const errorContainer = document.getElementById('errorContainer');
            const resultsContainer = document.getElementById('resultsContainer');
            const resultsInfo = document.getElementById('resultsInfo');

            button.disabled = true;
            buttonText.innerHTML = '<div class="spinner"></div><span>Searching...</span>';
            errorContainer.innerHTML = '';
            resultsInfo.style.display = 'none';

            // Transition to compact bar immediately
            document.body.classList.add('has-results');

            // Show animated loading state
            showLoadingState(resultsContainer, searchType);

            try {
                const response = await fetch(WEBHOOK_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query, searchType })
                });

                if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);

                let data = await response.json();
                if (Array.isArray(data) && data.length > 0) data = data[0];

                if (data.success && data.results) {
                    currentResults = data.results;
                    displayResults(data.results);
                } else {
                    throw new Error(data.error || 'Unknown error occurred');
                }
            } catch (error) {
                console.error('Search error:', error);
                errorContainer.innerHTML = `
                    <div class="error-message">
                        <span class="error-icon">⚠</span>
                        <div>
                            <strong>Search failed:</strong> ${error.message}
                            <br><small>Please check your webhook URL and try again.</small>
                        </div>
                    </div>
                `;
                resultsContainer.innerHTML = '';
            } finally {
                clearLoadingState();
                button.disabled = false;
                buttonText.textContent = 'Search';
            }
        }

        function displayResults(results) {
            const resultsContainer = document.getElementById('resultsContainer');
            const resultsInfo = document.getElementById('resultsInfo');
            const resultsCount = document.getElementById('resultsCount');

            if (results.length === 0) {
                resultsInfo.style.display = 'none';
                resultsContainer.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">🔍</div>
                        <h3 class="empty-state-title">No results found</h3>
                        <p class="empty-state-description">Try adjusting your search terms or be more specific.</p>
                    </div>
                `;
                return;
            }

            resultsInfo.style.display = 'block';
            resultsCount.innerHTML = `<strong>${results.length}</strong> ${results.length === 1 ? 'charity' : 'charities'} found`;

            resultsContainer.innerHTML = `
                <div class="results-grid">
                    ${results.map((charity, index) => createCharityCard(charity, index)).join('')}
                </div>
            `;
        }

        function createCharityCard(charity, index) {
            const income = charity.latest_income || 0;
            const recentGrants = parseArray(charity.recent_grants);
            const totalGrantsCount = recentGrants.length;

            let statusBadgeHTML = '';
            const linkedCharityNumber = charity.linked_charity_number;

            if (index < 3) {
                console.log(`Charity ${index}:`, charity.charity_name, 'linked_charity_number:', linkedCharityNumber, 'type:', typeof linkedCharityNumber);
            }

            if (linkedCharityNumber === 0 || linkedCharityNumber === '0') {
                statusBadgeHTML = '<span class="status-badge badge-parent">Parent</span>';
            } else if (linkedCharityNumber && linkedCharityNumber !== null && linkedCharityNumber !== 'null') {
                statusBadgeHTML = `<span class="status-badge badge-subsidiary">Sub #${linkedCharityNumber}</span>`;
            }

            const classifications = parseArray(charity.classifications);
            const areas = parseArray(charity.areas_of_operation);
            const tags = [...classifications.slice(0, 2), ...areas.slice(0, 1)];
            const delay = Math.min(index, 11) * 55;

            return `
                <div class="charity-card" style="--card-delay:${delay}ms" onclick="showCharityDetail(${index})">
                    <div class="card-header">
                        <h3 class="charity-name">${escapeHtml(charity.charity_name || 'Unknown Charity')}</h3>
                        ${statusBadgeHTML}
                    </div>
                    <p class="charity-activities">
                        ${escapeHtml(charity.charity_activities || 'No description available')}
                    </p>
                    <div class="charity-stats">
                        <div class="stat">
                            <div class="stat-label">Income</div>
                            <div class="stat-value">${formatCurrency(income)}</div>
                        </div>
                        <div class="stat">
                            <div class="stat-label">Grants Given</div>
                            <div class="stat-value">${totalGrantsCount}</div>
                        </div>
                        ${areas.length > 0 ? `
                        <div class="stat">
                            <div class="stat-label">Area</div>
                            <div class="stat-value" style="font-size:0.78rem;color:rgba(255,255,255,0.6)">${escapeHtml(areas[0])}</div>
                        </div>
                        ` : ''}
                    </div>
                    ${tags.length > 0 ? `
                    <div class="charity-tags">
                        ${tags.map(tag => `<span class="tag">${escapeHtml(tag)}</span>`).join('')}
                    </div>
                    ` : ''}
                </div>
            `;
        }

        function populateSidebar(charity) {
            const sidebar = document.getElementById('drawerSidebar');
            const orgNum = charity.organisation_number;
            const ccUrl = `https://register-of-charities.charitycommission.gov.uk/charity-search/-/charity-details/${orgNum}`;
            const annualReturnsUrl = `${ccUrl}/accounts-and-annual-returns`;

            const income      = charity.ai_total_income      || charity.latest_income      || 0;
            const expenditure = charity.ai_total_expenditure || charity.latest_expenditure || 0;
            const grants      = charity.total_grants_given   || 0;

            const linkedCharityNumber = charity.linked_charity_number;
            let badgeHTML = '';
            if (linkedCharityNumber === 0 || linkedCharityNumber === '0') {
                badgeHTML = '<span class="status-badge badge-parent" style="font-size:0.62rem">Parent</span>';
            } else if (linkedCharityNumber && linkedCharityNumber !== null && linkedCharityNumber !== 'null') {
                badgeHTML = `<span class="status-badge badge-subsidiary" style="font-size:0.62rem">Sub #${linkedCharityNumber}</span>`;
            }

            const areas = parseArray(charity.areas_of_operation).slice(0, 6);
            const hasContact = charity.charity_contact_web || charity.charity_contact_email || charity.charity_contact_phone;

            sidebar.innerHTML = `
                <div class="sb-section">
                    <div style="display:flex;align-items:center;gap:0.5rem;flex-wrap:wrap;">
                        <span class="sb-reg">No. ${escapeHtml(String(charity.registered_charity_number || charity.organisation_number || 'N/A'))}</span>
                        ${badgeHTML}
                    </div>
                </div>

                <div class="sb-divider"></div>

                <div class="sb-section">
                    <div class="sb-label">Finances</div>
                    ${income ? `<div class="sb-stat"><span class="sb-stat-label">Income</span><span class="sb-stat-value">${formatCurrency(income)}</span></div>` : ''}
                    ${expenditure ? `<div class="sb-stat"><span class="sb-stat-label">Expenditure</span><span class="sb-stat-value">${formatCurrency(expenditure)}</span></div>` : ''}
                    ${grants ? `<div class="sb-stat"><span class="sb-stat-label">Grants Given</span><span class="sb-stat-value">${formatCurrency(grants)}</span></div>` : ''}
                    ${!income && !expenditure && !grants ? `<div style="font-size:0.75rem;color:rgba(255,255,255,0.25);font-style:italic;">No financial data</div>` : ''}
                </div>

                ${hasContact ? `
                <div class="sb-divider"></div>
                <div class="sb-section">
                    <div class="sb-label">Contact</div>
                    ${charity.charity_contact_web ? `<a class="sb-link" href="${escapeHtml(charity.charity_contact_web)}" target="_blank" rel="noopener"><span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${escapeHtml(charity.charity_contact_web.replace(/^https?:\/\//, ''))}</span><span class="sb-link-arrow">↗</span></a>` : ''}
                    ${charity.charity_contact_email ? `<a class="sb-link" href="mailto:${escapeHtml(charity.charity_contact_email)}"><span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${escapeHtml(charity.charity_contact_email)}</span><span class="sb-link-arrow">↗</span></a>` : ''}
                    ${charity.charity_contact_phone ? `<a class="sb-link" href="tel:${escapeHtml(charity.charity_contact_phone)}" style="cursor:default;"><span>${escapeHtml(charity.charity_contact_phone)}</span></a>` : ''}
                </div>` : ''}

                ${areas.length > 0 ? `
                <div class="sb-divider"></div>
                <div class="sb-section">
                    <div class="sb-label">Areas of Operation</div>
                    <div class="sb-pills">
                        ${areas.map(a => `<span class="sb-pill">${escapeHtml(a)}</span>`).join('')}
                    </div>
                </div>` : ''}

                <div class="sb-divider"></div>

                <div class="sb-section">
                    <div class="sb-label">Links</div>
                    <a class="sb-link" href="${ccUrl}" target="_blank" rel="noopener">
                        <span>Charity Commission</span><span class="sb-link-arrow">↗</span>
                    </a>
                    <a class="sb-link" href="${annualReturnsUrl}" target="_blank" rel="noopener">
                        <span>Latest Annual Returns</span><span class="sb-link-arrow">↗</span>
                    </a>
                </div>
            `;
        }

        function showCharityDetail(index) {
            const charity = currentResults[index];
            const backdrop = document.getElementById('drawerBackdrop');

            document.getElementById('modalTitle').textContent = charity.charity_name || 'Unknown Charity';
            document.getElementById('modalSubtitle').textContent = `Charity No. ${charity.registered_charity_number || charity.organisation_number || 'N/A'}`;

            populateSidebar(charity);
            populateOverviewTab(charity);
            populateFinancialsTab(charity);
            populateStrategyTab(charity);
            populateGrantsTab(charity);
            populateTrusteesTab(charity);

            backdrop.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            const backdrop = document.getElementById('drawerBackdrop');
            backdrop.classList.remove('active');
            document.body.style.overflow = '';
            switchTab(0);
        }

        function switchTab(tabIndex) {
            document.querySelectorAll('.tab').forEach((tab, i) => {
                tab.classList.toggle('active', i === tabIndex);
            });
            document.querySelectorAll('.tab-panel').forEach((panel, i) => {
                panel.classList.toggle('active', i === tabIndex);
            });
        }

        function populateOverviewTab(charity) {
            const tab = document.getElementById('tab0');
            const charityCommissionUrl = `https://register-of-charities.charitycommission.gov.uk/charity-search/-/charity-details/${charity.organisation_number}`;

            tab.innerHTML = `
                <div class="info-grid">
                    <div class="info-item">
                        <div class="info-label">Activities</div>
                        <div class="info-value">${escapeHtml(charity.charity_activities || 'Not available')}</div>
                    </div>
                    ${charity.charity_contact_web ? `
                    <div class="info-item">
                        <div class="info-label">Website</div>
                        <div class="info-value">
                            <a href="${escapeHtml(charity.charity_contact_web)}" target="_blank" rel="noopener">
                                ${escapeHtml(charity.charity_contact_web)}
                            </a>
                        </div>
                    </div>
                    ` : ''}
                    ${charity.charity_contact_email ? `
                    <div class="info-item">
                        <div class="info-label">Email</div>
                        <div class="info-value">
                            <a href="mailto:${escapeHtml(charity.charity_contact_email)}">
                                ${escapeHtml(charity.charity_contact_email)}
                            </a>
                        </div>
                    </div>
                    ` : ''}
                    ${charity.charity_contact_phone ? `
                    <div class="info-item">
                        <div class="info-label">Phone</div>
                        <div class="info-value">${escapeHtml(charity.charity_contact_phone)}</div>
                    </div>
                    ` : ''}
                    ${charity.charity_contact_postcode ? `
                    <div class="info-item">
                        <div class="info-label">Postcode</div>
                        <div class="info-value">${escapeHtml(charity.charity_contact_postcode)}</div>
                    </div>
                    ` : ''}
                    <div class="info-item">
                        <div class="info-label">Links</div>
                        <div class="info-value" style="display:flex;flex-direction:column;gap:0.375rem;">
                            <a href="${charityCommissionUrl}" target="_blank" rel="noopener">Charity Commission ↗</a>
                            <a href="${charityCommissionUrl}/accounts-and-annual-returns" target="_blank" rel="noopener">Latest Annual Returns ↗</a>
                        </div>
                    </div>
                    ${parseArray(charity.classifications).length > 0 ? `
                    <div class="info-item">
                        <div class="info-label">Classifications</div>
                        <div class="array-list">
                            ${parseArray(charity.classifications).map(c =>
                                `<span class="array-item">${escapeHtml(c)}</span>`
                            ).join('')}
                        </div>
                    </div>
                    ` : ''}
                    ${parseArray(charity.areas_of_operation).length > 0 ? `
                    <div class="info-item">
                        <div class="info-label">Areas of Operation</div>
                        <div class="array-list">
                            ${parseArray(charity.areas_of_operation).slice(0, 10).map(a =>
                                `<span class="array-item">${escapeHtml(a)}</span>`
                            ).join('')}
                        </div>
                    </div>
                    ` : ''}
                </div>
            `;
        }

        function populateFinancialsTab(charity) {
            const tab = document.getElementById('tab1');

            const hasAI      = charity.ai_total_income || charity.ai_total_expenditure;
            const income      = charity.ai_total_income      || charity.latest_income      || 0;
            const expenditure = charity.ai_total_expenditure || charity.latest_expenditure || 0;
            const surplus     = income - expenditure;
            const noData      = income === 0 && expenditure === 0;

            const headlineClass  = noData ? 'neutral' : surplus >= 0 ? 'surplus' : 'deficit';
            const headlineLabel  = noData ? 'No financial data' : surplus >= 0 ? 'Surplus' : 'Deficit';
            const marginPct      = income > 0 ? Math.abs(surplus / income * 100).toFixed(1) : null;

            const maxVal         = Math.max(income, expenditure);
            const incomePct      = maxVal > 0 ? (income      / maxVal * 100).toFixed(1) : 0;
            const expenditurePct = maxVal > 0 ? (expenditure / maxVal * 100).toFixed(1) : 0;
            const overBudget     = expenditure > income;

            // Breakdown items
            const incomeItems = [];
            if (charity.income_donations)   incomeItems.push({ label: 'Donations & Legacies',    value: charity.income_donations });
            if (charity.income_charitable)  incomeItems.push({ label: 'Charitable Activities',   value: charity.income_charitable });

            const expendItems = [];
            const charitableExp      = charity.ai_charitable_expenditure || charity.expenditure_grants;
            const charitableExpLabel = charity.ai_charitable_expenditure ? 'Charitable Expenditure' : 'Grant Expenditure';
            if (charitableExp) expendItems.push({ label: charitableExpLabel, value: charitableExp });

            const hasBreakdown = incomeItems.length > 0 || expendItems.length > 0;

            const hasFunds = charity.ai_unrestricted_funds || charity.ai_restricted_funds
                          || charity.ai_endowment_funds    || charity.ai_cash || charity.ai_investments;

            const renderLines = (items, total) => {
                if (items.length === 0) return `<div class="fin-nil">No breakdown available</div>`;
                return items.map((item, i) => {
                    const pct = total > 0 ? (item.value / total * 100).toFixed(1) : 0;
                    return `
                        <div class="fin-line">
                            <div class="fin-line-top">
                                <span class="fin-line-label">${item.label}</span>
                                <span class="fin-line-value">${formatCurrency(item.value)}</span>
                            </div>
                            <div class="fin-line-track">
                                <div class="fin-line-fill" style="--bar-pct:${pct}%;--bar-delay:${0.12 + i * 0.07}s"></div>
                            </div>
                        </div>`;
                }).join('');
            };

            tab.innerHTML = `
                ${hasAI && charity.ai_financial_year ? `
                <div class="ai-banner">AI-extracted data from annual accounts (${charity.ai_financial_year})</div>` : ''}

                <div class="fin-headline ${headlineClass}">
                    <div>
                        <div class="fin-headline-label">${headlineLabel}</div>
                        ${!noData ? `<div class="fin-headline-amount">${formatCurrency(Math.abs(surplus))}</div>` : ''}
                        ${marginPct ? `<div class="fin-headline-margin">${marginPct}% of income</div>` : ''}
                    </div>
                </div>

                ${maxVal > 0 ? `
                <div class="fin-compare">
                    <div class="fin-compare-row">
                        <div class="fin-compare-label">Income</div>
                        <div class="fin-compare-track">
                            <div class="fin-compare-fill income" style="--bar-pct:${incomePct}%;--bar-delay:0ms"></div>
                        </div>
                        <div class="fin-compare-value">${formatCurrency(income)}</div>
                    </div>
                    <div class="fin-compare-row">
                        <div class="fin-compare-label">Expenditure</div>
                        <div class="fin-compare-track">
                            <div class="fin-compare-fill expenditure ${overBudget ? 'over' : ''}" style="--bar-pct:${expenditurePct}%;--bar-delay:80ms"></div>
                        </div>
                        <div class="fin-compare-value dim">${formatCurrency(expenditure)}</div>
                    </div>
                </div>` : ''}

                ${hasBreakdown ? `
                <div class="fin-columns">
                    <div>
                        <div class="fin-col-header">
                            <span class="fin-col-title">Income</span>
                            <span class="fin-col-total">${formatCurrency(income)}</span>
                        </div>
                        ${renderLines(incomeItems, income)}
                    </div>
                    <div>
                        <div class="fin-col-header">
                            <span class="fin-col-title">Expenditure</span>
                            <span class="fin-col-total">${formatCurrency(expenditure)}</span>
                        </div>
                        ${renderLines(expendItems, expenditure)}
                        ${charity.total_grants_given ? `
                        <div class="fin-line" style="margin-top:0.75rem;padding-top:0.625rem;border-top:1px solid rgba(240,198,154,0.08);">
                            <div class="fin-line-top">
                                <span class="fin-line-label">of which: Grants Given</span>
                                <span class="fin-line-value">${formatCurrency(charity.total_grants_given)}</span>
                            </div>
                        </div>` : ''}
                    </div>
                </div>` : `
                ${charity.total_grants_given ? `
                <div style="margin-bottom:1.25rem;">
                    <div class="fin-col-header">
                        <span class="fin-col-title">Grants Given</span>
                        <span class="fin-col-total">${formatCurrency(charity.total_grants_given)}</span>
                    </div>
                </div>` : ''}`}

                ${hasFunds ? `
                <div class="section-heading" style="margin-top:0.5rem;">Funds &amp; Assets</div>
                <div class="stat-grid">
                    ${charity.ai_unrestricted_funds ? `<div class="stat-card"><div class="stat-card-label">Unrestricted Funds</div><div class="stat-card-value">${formatCurrency(charity.ai_unrestricted_funds)}</div></div>` : ''}
                    ${charity.ai_restricted_funds   ? `<div class="stat-card"><div class="stat-card-label">Restricted Funds</div><div class="stat-card-value">${formatCurrency(charity.ai_restricted_funds)}</div></div>` : ''}
                    ${charity.ai_endowment_funds    ? `<div class="stat-card"><div class="stat-card-label">Endowment Funds</div><div class="stat-card-value">${formatCurrency(charity.ai_endowment_funds)}</div></div>` : ''}
                    ${charity.ai_cash               ? `<div class="stat-card"><div class="stat-card-label">Cash</div><div class="stat-card-value">${formatCurrency(charity.ai_cash)}</div></div>` : ''}
                    ${charity.ai_investments        ? `<div class="stat-card"><div class="stat-card-label">Investments</div><div class="stat-card-value">${formatCurrency(charity.ai_investments)}</div></div>` : ''}
                </div>` : ''}
            `;
        }

        function parseStrategyJson(value) {
            if (!value || value === 'null') return null;
            if (typeof value === 'object' && !Array.isArray(value)) return value;
            if (Array.isArray(value)) {
                if (value.length === 0) return null;
                const rejoined = value.join(',');
                if (rejoined.trimStart().startsWith('{') || rejoined.trimStart().startsWith('[')) {
                    try { return JSON.parse(rejoined); } catch { /* fall through */ }
                }
                return value.filter(Boolean);
            }
            if (typeof value === 'string') {
                const trimmed = value.trim();
                if (!trimmed || trimmed === 'null') return null;
                try { return JSON.parse(trimmed); } catch { return null; }
            }
            return null;
        }

        function renderExclusions(raw) {
            const obj = parseStrategyJson(raw);
            if (!obj) return [];
            if (Array.isArray(obj)) return obj.filter(Boolean);

            const labels = {
                excludes_individuals: 'Excludes individuals',
                excludes_organisations: 'Excludes organisations',
                excludes_political: 'Excludes political activity'
            };

            const results = [];
            for (const [key, val] of Object.entries(obj)) {
                if (key === 'other_exclusions') {
                    if (Array.isArray(val)) val.filter(Boolean).forEach(v => results.push(v));
                } else if (val === true) {
                    results.push(labels[key] || key.replace(/_/g, ' '));
                }
            }
            return results;
        }

        function renderLeverageSignals(raw) {
            const obj = parseStrategyJson(raw);
            if (!obj) return [];

            if (Array.isArray(obj)) {
                return obj.filter(Boolean).length > 0
                    ? [{ label: 'Signals', items: obj.filter(Boolean) }]
                    : [];
            }

            const labelMap = {
                flagship_partners: 'Flagship Partners',
                notable_donors: 'Notable Donors',
                co_trusteeships: 'Co-trusteeships'
            };

            const sections = [];
            for (const [key, val] of Object.entries(obj)) {
                if (Array.isArray(val) && val.filter(Boolean).length > 0) {
                    sections.push({ label: labelMap[key] || key.replace(/_/g, ' '), items: val.filter(Boolean) });
                }
            }
            return sections;
        }

        function populateStrategyTab(charity) {
            const tab = document.getElementById('tab2');
            const missionTags = parseArray(charity.mission_tags);
            const geography = parseArray(charity.geography);
            const exclusions = renderExclusions(charity.exclusion_flags);
            const leverageSections = renderLeverageSignals(charity.leverage_signals);

            const hasContent = charity.mission_text
                || missionTags.length > 0
                || geography.length > 0
                || exclusions.length > 0
                || leverageSections.length > 0;

            if (!hasContent) {
                tab.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📋</div>
                        <h3 class="empty-state-title">No strategy data available</h3>
                        <p class="empty-state-description">Strategy information has not been extracted for this charity.</p>
                    </div>
                `;
                return;
            }

            tab.innerHTML = `
                <div class="info-grid">
                    ${charity.mission_text ? `
                    <div class="info-item">
                        <div class="info-label">Mission</div>
                        <div class="info-value">${escapeHtml(charity.mission_text)}</div>
                    </div>` : ''}
                    ${missionTags.length > 0 ? `
                    <div class="info-item">
                        <div class="info-label">Mission Tags</div>
                        <div class="array-list">
                            ${missionTags.map(t => `<span class="array-item">${escapeHtml(t)}</span>`).join('')}
                        </div>
                    </div>` : ''}
                    ${geography.length > 0 ? `
                    <div class="info-item">
                        <div class="info-label">Geographic Focus</div>
                        <div class="array-list">
                            ${geography.map(g => `<span class="array-item">${escapeHtml(g)}</span>`).join('')}
                        </div>
                    </div>` : ''}
                    ${exclusions.length > 0 ? `
                    <div class="info-item">
                        <div class="info-label">Exclusions</div>
                        <div class="array-list">
